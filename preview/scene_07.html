<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 07 — The Exploding Gradient</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root{--bg:#0b0f1a;--surface:#151d30;--text:#e8ecf4;--muted:#8892a8;--dim:#4a5568;--accent:#f97316;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--green:#10b981;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;width:1920px;height:1080px;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0">
<defs>
  <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowAccent" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
  </marker>
  <marker id="arrowAccent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
  </marker>
  <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
  </marker>
</defs>

<!-- OBS background -->
<rect width="1920" height="1080" fill="#0b0f1a"/>

<!-- Subtle grid -->
<g opacity="0.04">
  <line x1="480" y1="0" x2="480" y2="1080" stroke="#e8ecf4" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="1080" stroke="#e8ecf4" stroke-width="1"/>
  <line x1="1440" y1="0" x2="1440" y2="1080" stroke="#e8ecf4" stroke-width="1"/>
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#e8ecf4" stroke-width="1"/>
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#e8ecf4" stroke-width="1"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#e8ecf4" stroke-width="1"/>
</g>

<!-- ===== PHASE 1: EXPLODING GRADIENT VISUALIZATION ===== -->
<!--
  Mirrors scene 6's layout but with GROWING gradients.
  
  12 RNN cells in horizontal chain (same as scene 6 for visual continuity).
  Cell width=80, height=60, gap=50
  Total: 12*80 + 11*50 = 960+550 = 1510
  Start x = (1920-1510)/2 = 205
  Cell centers: 245, 375, 505, 635, 765, 895, 1025, 1155, 1285, 1415, 1545, 1675
  Cells y=160..220, cy=190
  
  Below cells: "x 1.1" multiplication labels (backward, growing from left to right)
  Below that: gradient magnitude bars (GROWING from left to right)
  Below that: exponential growth curve (y=560..920)
  
  Center check: (205 + 205+1510)/2 = (205+1715)/2 = 960 ✓
-->

<g id="phase1">

  <!-- "The opposite" label — connects to scene 6 -->
  <g id="oppositeLabel" opacity="0">
    <text x="960" y="80" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#8892a8">scene 6: weights &lt; 1</text>
    <!-- Arrow SVG pointing right -->
    <line x1="1150" y1="73" x2="1210" y2="73" stroke="#8892a8" stroke-width="2"/>
    <polygon points="1210,68 1220,73 1210,78" fill="#8892a8"/>
    <text x="1330" y="80" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#f97316" font-weight="600">now: weights &gt; 1</text>
  </g>

  <!-- 12 RNN step cells -->
  <g id="cellChain" opacity="0">
    <rect x="205" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="335" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="465" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="595" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="725" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="855" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="985" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="1115" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="1245" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="1375" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="1505" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <rect x="1635" y="160" width="80" height="60" rx="8" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <!-- Step labels -->
    <text x="245" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">1</text>
    <text x="375" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">2</text>
    <text x="505" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">3</text>
    <text x="635" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">4</text>
    <text x="765" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">5</text>
    <text x="895" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">6</text>
    <text x="1025" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">7</text>
    <text x="1155" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">8</text>
    <text x="1285" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">9</text>
    <text x="1415" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">10</text>
    <text x="1545" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">11</text>
    <text x="1675" y="242" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#4a5568">12</text>
    <!-- Forward arrows between cells (subtle) -->
    <line x1="285" y1="190" x2="330" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="415" y1="190" x2="460" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="545" y1="190" x2="590" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="675" y1="190" x2="720" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="805" y1="190" x2="850" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="935" y1="190" x2="980" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="1065" y1="190" x2="1110" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="1195" y1="190" x2="1240" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="1325" y1="190" x2="1370" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="1455" y1="190" x2="1500" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
    <line x1="1585" y1="190" x2="1630" y2="190" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.3"/>
  </g>

  <!-- Backward gradient arrows with "x 1.1" — GROWING opacity/width from right to left -->
  <!-- In exploding: gradient starts small at right (origin), grows as it goes left (backward) -->
  <!-- But visually we show backward arrows right-to-left, with increasing intensity leftward -->
  <!-- Wait — gradient starts at the loss (right side, step 12) and flows backward (leftward) -->
  <!-- With weights > 1: as we go backward (right to left), gradient GROWS -->
  <!-- So at step 12 (rightmost), gradient is small. At step 1 (leftmost), it's enormous. -->
  <!-- This is the OPPOSITE of scene 6 where step 1 was tiny. Now step 1 is huge. -->
  <g id="backwardGradients" opacity="0">
    <!-- Step 12→11 (origin, small) -->
    <line x1="1630" y1="270" x2="1590" y2="270" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowAccent)" opacity="0.3"/>
    <text x="1610" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.3">x 1.1</text>
    <!-- 11→10 -->
    <line x1="1500" y1="270" x2="1460" y2="270" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowAccent)" opacity="0.35"/>
    <text x="1480" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.35">x 1.1</text>
    <!-- 10→9 -->
    <line x1="1370" y1="270" x2="1330" y2="270" stroke="#f97316" stroke-width="2" marker-end="url(#arrowAccent)" opacity="0.4"/>
    <text x="1350" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.4">x 1.1</text>
    <!-- 9→8 -->
    <line x1="1240" y1="270" x2="1200" y2="270" stroke="#f97316" stroke-width="2" marker-end="url(#arrowAccent)" opacity="0.45"/>
    <text x="1220" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.45">x 1.1</text>
    <!-- 8→7 -->
    <line x1="1110" y1="270" x2="1070" y2="270" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowAccent)" opacity="0.5"/>
    <text x="1090" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.5">x 1.1</text>
    <!-- 7→6 -->
    <line x1="980" y1="270" x2="940" y2="270" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowAccent)" opacity="0.6"/>
    <text x="960" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.6">x 1.1</text>
    <!-- 6→5 -->
    <line x1="850" y1="270" x2="810" y2="270" stroke="#f97316" stroke-width="3" marker-end="url(#arrowAccent)" opacity="0.7"/>
    <text x="830" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.7">x 1.1</text>
    <!-- 5→4 -->
    <line x1="720" y1="270" x2="680" y2="270" stroke="#f97316" stroke-width="3" marker-end="url(#arrowAccent)" opacity="0.8"/>
    <text x="700" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.8">x 1.1</text>
    <!-- 4→3 -->
    <line x1="590" y1="270" x2="550" y2="270" stroke="#f97316" stroke-width="3.5" marker-end="url(#arrowAccent)" opacity="0.85"/>
    <text x="570" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.85">x 1.1</text>
    <!-- 3→2 -->
    <line x1="460" y1="270" x2="420" y2="270" stroke="#f97316" stroke-width="4" marker-end="url(#arrowAccent)" opacity="0.9"/>
    <text x="440" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="0.9">x 1.1</text>
    <!-- 2→1 (MASSIVE) -->
    <line x1="330" y1="270" x2="290" y2="270" stroke="#f97316" stroke-width="5" marker-end="url(#arrowAccent)" opacity="1.0"/>
    <text x="310" y="296" text-anchor="middle" font-family="'Instrument Serif',serif" font-style="italic" font-size="16" fill="#f97316" opacity="1.0">x 1.1</text>
  </g>

  <!-- Gradient magnitude bars (GROWING from right to left) -->
  <!--
    Gradient starts at loss (step 12, rightmost) and flows backward.
    With weight > 1, as it goes back (leftward), it GROWS.
    So step 1 (leftmost) has the LARGEST bar. Step 12 (rightmost) has the smallest.
    
    Bars: y bottom=500, variable height upward. Top of bars region: ~320.
    Bar width=40, centered on cell cx.
    Max bar height (step 1): 180px. Min bar height (step 12): 12px.
    
    1.1^11=2.85. Normalize to 180px max:
    step1 (n=11, val=2.85): h=180
    step2 (n=10, val=2.59): h=163
    step3 (n=9, val=2.36): h=149
    step4 (n=8, val=2.14): h=135
    step5 (n=7, val=1.95): h=123
    step6 (n=6, val=1.77): h=112
    step7 (n=5, val=1.61): h=102
    step8 (n=4, val=1.46): h=92
    step9 (n=3, val=1.33): h=84
    step10 (n=2, val=1.21): h=77
    step11 (n=1, val=1.1): h=70
    step12 (n=0, val=1.0): h=63
  -->
  <g id="gradBars" opacity="0">
    <rect x="225" y="320" width="40" height="180" rx="4" fill="#f97316" opacity="1.0"/>
    <rect x="355" y="337" width="40" height="163" rx="4" fill="#f97316" opacity="0.93"/>
    <rect x="485" y="351" width="40" height="149" rx="4" fill="#f97316" opacity="0.85"/>
    <rect x="615" y="365" width="40" height="135" rx="4" fill="#f97316" opacity="0.77"/>
    <rect x="745" y="377" width="40" height="123" rx="4" fill="#f97316" opacity="0.68"/>
    <rect x="875" y="388" width="40" height="112" rx="4" fill="#f97316" opacity="0.6"/>
    <rect x="1005" y="398" width="40" height="102" rx="4" fill="#f97316" opacity="0.52"/>
    <rect x="1135" y="408" width="40" height="92" rx="4" fill="#f97316" opacity="0.44"/>
    <rect x="1265" y="416" width="40" height="84" rx="4" fill="#f97316" opacity="0.37"/>
    <rect x="1395" y="423" width="40" height="77" rx="4" fill="#f97316" opacity="0.3"/>
    <rect x="1525" y="430" width="40" height="70" rx="4" fill="#f97316" opacity="0.25"/>
    <rect x="1655" y="437" width="40" height="63" rx="4" fill="#f97316" opacity="0.2"/>
    <!-- Y-axis label -->
    <text x="170" y="410" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#8892a8" transform="rotate(-90, 170, 410)">gradient</text>
  </g>

  <!-- Numerical callouts: 1.1^10 = 2.6, 1.1^50 = 117 -->
  <!-- Positioned below bars, clear of bar bottoms (y=500) -->
  <g id="callout10" opacity="0">
    <rect x="1220" y="510" width="280" height="50" rx="10" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <text x="1360" y="543" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="22" fill="#f97316">10 steps: 2.6</text>
  </g>
  <g id="callout50" opacity="0">
    <rect x="200" y="510" width="310" height="50" rx="10" fill="#151d30" stroke="#f97316" stroke-width="2"/>
    <text x="355" y="543" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="22" fill="#f97316" font-weight="600">50 steps: 117</text>
  </g>

  <!-- "the gradients explode" label -->
  <g id="explodeLabel" opacity="0">
    <text x="960" y="590" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="42" font-weight="700" fill="#f97316" filter="url(#glowAccent)">the gradients explode</text>
  </g>

  <!-- Exponential growth curve (y=640..980, x=200..1720) -->
  <!--
    Plot 1.1^n for n=0..50.
    x: 200 (n=0) to 1720 (n=50), px_per_step = 30.4
    y: 940 (value=0) to 580 (value_max). Range=360px.
    1.1^50 = 117.4. Map value to y: y = 940 - (value/117.4)*360
    
    Key points:
    n=0: val=1, y=940 - (1/117.4)*360 = 940-3 = 937
    n=10: val=2.59, y=940-(2.59/117.4)*360=940-8=932
    n=20: val=6.73, y=940-(6.73/117.4)*360=940-21=919
    n=25: val=10.83, y=940-(10.83/117.4)*360=940-33=907
    n=30: val=17.45, y=940-(17.45/117.4)*360=940-53=887
    n=35: val=28.1, y=940-(28.1/117.4)*360=940-86=854
    n=40: val=45.26, y=940-(45.26/117.4)*360=940-139=801
    n=42: val=54.76, y=940-(54.76/117.4)*360=940-168=772
    n=44: val=66.26, y=940-(66.26/117.4)*360=940-203=737
    n=46: val=80.18, y=940-(80.18/117.4)*360=940-246=694
    n=48: val=97.02, y=940-(97.02/117.4)*360=940-298=642
    n=50: val=117.4, y=940-(117.4/117.4)*360=940-360=580
    
    Denser points near the spike (n=40-50):
  -->
  <!--
    Recomputed for y range 640..1000 (360px height):
    1.1^50 = 117.4. Map value to y: y = 1000 - (value/117.4)*360
    
    n=0: val=1, y=1000-3=997
    n=10: val=2.59, y=1000-8=992
    n=20: val=6.73, y=1000-21=979
    n=30: val=17.45, y=1000-53=947
    n=40: val=45.26, y=1000-139=861
    n=50: val=117.4, y=1000-360=640
  -->
  <g id="growthCurve" opacity="0">
    <!-- Axes -->
    <line x1="200" y1="1000" x2="1720" y2="1000" stroke="#4a5568" stroke-width="2"/>
    <line x1="200" y1="640" x2="200" y2="1000" stroke="#4a5568" stroke-width="2"/>
    <!-- Axis labels -->
    <text x="960" y="1040" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="18" fill="#8892a8">time steps (backward)</text>
    <text x="150" y="820" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#8892a8" transform="rotate(-90, 150, 820)">gradient magnitude</text>
    <!-- X tick marks -->
    <text x="200" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">0</text>
    <text x="504" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">10</text>
    <text x="808" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">20</text>
    <text x="1112" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">30</text>
    <text x="1416" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">40</text>
    <text x="1720" y="1020" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">50</text>
    <!-- Y-axis labels -->
    <text x="185" y="1004" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">0</text>
    <text x="185" y="820" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">60</text>
    <text x="185" y="644" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568">117</text>
    
    <!-- Exponential growth curve polyline (recomputed for y=640..1000) -->
    <polyline id="growthLine" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"
