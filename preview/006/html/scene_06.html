<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Scene 06 - What Hidden Neurons Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root {
  --bg: #0b0f1a; --surface: #151d30; --text: #e8ecf4;
  --muted: #8892a8; --dim: #4a5568; --accent: #f97316;
  --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444;
  --green: #10b981; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  width: 1920px; height: 1080px; overflow: hidden; position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1000;
}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<svg id="mainSvg" width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0;">
  <defs>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- OBS background rect -->
  <rect width="1920" height="1080" fill="#0b0f1a"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Three Hidden Neuron Lines (0 - 24s)                 -->
  <!-- ============================================================ -->
  <g id="phase1">

    <!-- Scene title -->
    <text id="p1Title" x="960" y="60" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">What Hidden Neurons Learn</text>

    <!-- Scatter plot background panel -->
    <rect id="plotBg" x="440" y="90" width="780" height="700" rx="18" fill="#151d30" opacity="0.5"/>

    <!-- Axes -->
    <line id="xAxis" x1="520" y1="720" x2="1140" y2="720" stroke="#8892a8" stroke-width="2.5"/>
    <line id="yAxis" x1="520" y1="720" x2="520" y2="140" stroke="#8892a8" stroke-width="2.5"/>

    <!-- Axis labels -->
    <text id="xLabel" x="830" y="770" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8">Hours Studied</text>
    <text id="yLabel" x="460" y="430" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8" transform="rotate(-90 460 430)">Hours Slept</text>

    <!-- X-axis ticks -->
    <g id="xTicks" font-family="IBM Plex Mono" font-size="20" fill="#4a5568" text-anchor="middle">
      <line x1="582" y1="714" x2="582" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="582" y="748">2</text>
      <line x1="706" y1="714" x2="706" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="706" y="748">4</text>
      <line x1="830" y1="714" x2="830" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="830" y="748">6</text>
      <line x1="954" y1="714" x2="954" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="954" y="748">8</text>
      <line x1="1078" y1="714" x2="1078" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="1078" y="748">10</text>
    </g>

    <!-- Y-axis ticks -->
    <g id="yTicks" font-family="IBM Plex Mono" font-size="20" fill="#4a5568" text-anchor="end">
      <line x1="514" y1="604" x2="526" y2="604" stroke="#4a5568" stroke-width="1.5"/>
      <text x="508" y="610">4</text>
      <line x1="514" y1="488" x2="526" y2="488" stroke="#4a5568" stroke-width="1.5"/>
      <text x="508" y="494">6</text>
      <line x1="514" y1="372" x2="526" y2="372" stroke="#4a5568" stroke-width="1.5"/>
      <text x="508" y="378">8</text>
      <line x1="514" y1="256" x2="526" y2="256" stroke="#4a5568" stroke-width="1.5"/>
      <text x="508" y="262">10</text>
    </g>

    <!-- Data dots: green (pass) and red (fail) -->
    <!-- Pass region roughly: high study + decent sleep, or decent combo -->
    <!-- x scale: 520 + (val/10)*620, y scale: 720 - (val/10)*580 -->
    <g id="dataDots">
      <!-- Green pass dots -->
      <circle class="dotGreen" cx="892" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 6,8 -->
      <circle class="dotGreen" cx="954" cy="256" r="8" fill="#10b981" opacity="0.8"/><!-- 7,10 -->
      <circle class="dotGreen" cx="830" cy="430" r="8" fill="#10b981" opacity="0.8"/><!-- 5,7 -->
      <circle class="dotGreen" cx="1016" cy="314" r="8" fill="#10b981" opacity="0.8"/><!-- 8,9 -->
      <circle class="dotGreen" cx="1078" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 9,8 -->
      <circle class="dotGreen" cx="954" cy="430" r="8" fill="#10b981" opacity="0.8"/><!-- 7,7 -->
      <circle class="dotGreen" cx="1016" cy="488" r="8" fill="#10b981" opacity="0.8"/><!-- 8,6 -->
      <circle class="dotGreen" cx="830" cy="314" r="8" fill="#10b981" opacity="0.8"/><!-- 5,9 -->
      <circle class="dotGreen" cx="892" cy="488" r="8" fill="#10b981" opacity="0.8"/><!-- 6,6 -->
      <circle class="dotGreen" cx="768" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 4,8 -->
      <circle class="dotGreen" cx="1078" cy="256" r="8" fill="#10b981" opacity="0.8"/><!-- 9,10 -->
      <circle class="dotGreen" cx="954" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 7,8 -->

      <!-- Red fail dots -->
      <circle class="dotRed" cx="582" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,4 -->
      <circle class="dotRed" cx="644" cy="662" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,3 -->
      <circle class="dotRed" cx="582" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,5 -->
      <circle class="dotRed" cx="706" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 3,4 -->
      <circle class="dotRed" cx="644" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,5 -->
      <circle class="dotRed" cx="582" cy="430" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,7 -->
      <circle class="dotRed" cx="706" cy="662" r="8" fill="#ef4444" opacity="0.8"/><!-- 3,3 -->
      <circle class="dotRed" cx="768" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 4,4 -->
      <circle class="dotRed" cx="644" cy="430" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,7 -->
      <circle class="dotRed" cx="768" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 4,5 -->
      <circle class="dotRed" cx="830" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 5,4 -->
      <circle class="dotRed" cx="1016" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 8,4 -->
    </g>

    <!-- Neuron icons on left side -->
    <g id="neuron1Icon">
      <circle cx="280" cy="280" r="30" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="280" y="288" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#3b82f6">H&#x2081;</text>
      <circle id="n1Pulse" cx="280" cy="280" r="30" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0" filter="url(#pulseGlow)"/>
    </g>

    <g id="neuron2Icon">
      <circle cx="280" cy="430" r="30" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <text x="280" y="438" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#8b5cf6">H&#x2082;</text>
      <circle id="n2Pulse" cx="280" cy="430" r="30" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0" filter="url(#pulseGlow)"/>
    </g>

    <g id="neuron3Icon">
      <circle cx="280" cy="580" r="30" fill="#151d30" stroke="#06b6d4" stroke-width="2.5"/>
      <text x="280" y="588" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#06b6d4">H&#x2083;</text>
      <circle id="n3Pulse" cx="280" cy="580" r="30" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0" filter="url(#pulseGlow)"/>
    </g>

    <!-- Connection lines from neuron icons to their decision lines -->
    <line id="conn1" x1="310" y1="280" x2="520" y2="280" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
    <line id="conn2" x1="310" y1="430" x2="520" y2="500" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
    <line id="conn3" x1="310" y1="580" x2="520" y2="580" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

    <!-- Decision line 1 (blue, near-vertical): study threshold at ~x=4 (px=768) -->
    <line id="line1" x1="768" y1="140" x2="768" y2="720" stroke="#3b82f6" stroke-width="3" stroke-dasharray="800" stroke-dashoffset="800"/>
    <!-- Decision line 2 (purple, near-horizontal): sleep threshold at ~y=5 (py=546) -->
    <line id="line2" x1="520" y1="546" x2="1140" y2="546" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="800" stroke-dashoffset="800"/>
    <!-- Decision line 3 (cyan, diagonal): combined threshold -->
    <line id="line3" x1="582" y1="200" x2="1100" y2="720" stroke="#06b6d4" stroke-width="3" stroke-dasharray="1000" stroke-dashoffset="1000"/>

    <!-- Line labels -->
    <g id="label1">
      <rect x="1200" y="180" width="290" height="48" rx="10" fill="#0b0f1a" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="1345" y="212" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#3b82f6">H&#x2081;: Study threshold</text>
    </g>

    <g id="label2">
      <rect x="1200" y="340" width="290" height="48" rx="10" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="1345" y="372" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8b5cf6">H&#x2082;: Sleep threshold</text>
    </g>

    <g id="label3">
      <rect x="1200" y="500" width="290" height="48" rx="10" fill="#0b0f1a" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="1345" y="532" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#06b6d4">H&#x2083;: Combined</text>
    </g>

    <!-- "Each neuron = one line" badge -->
    <g id="oneLineBadge">
      <rect x="1200" y="660" width="290" height="48" rx="12" fill="#151d30" stroke="#f97316" stroke-width="2"/>
      <text x="1345" y="692" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#f97316">Each neuron = one line</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Cover rect for phase transition                              -->
  <!-- ============================================================ -->
  <rect id="phaseCover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Region Combination (24.6 - 47s)                     -->
  <!-- ============================================================ -->
  <g id="phase2">

    <!-- Scene title -->
    <text id="p2Title" x="960" y="60" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">How the Output Combines Them</text>

    <!-- Scatter plot background panel (same position) -->
    <rect id="plotBg2" x="120" y="90" width="780" height="700" rx="18" fill="#151d30" opacity="0.5"/>

    <!-- Axes -->
    <line id="xAxis2" x1="200" y1="720" x2="820" y2="720" stroke="#8892a8" stroke-width="2.5"/>
    <line id="yAxis2" x1="200" y1="720" x2="200" y2="140" stroke="#8892a8" stroke-width="2.5"/>

    <!-- Axis labels -->
    <text id="xLabel2" x="510" y="770" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8">Hours Studied</text>
    <text id="yLabel2" x="140" y="430" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8" transform="rotate(-90 140 430)">Hours Slept</text>

    <!-- X-axis ticks -->
    <g id="xTicks2" font-family="IBM Plex Mono" font-size="20" fill="#4a5568" text-anchor="middle">
      <line x1="262" y1="714" x2="262" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="262" y="748">2</text>
      <line x1="386" y1="714" x2="386" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="386" y="748">4</text>
      <line x1="510" y1="714" x2="510" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="510" y="748">6</text>
      <line x1="634" y1="714" x2="634" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="634" y="748">8</text>
      <line x1="758" y1="714" x2="758" y2="726" stroke="#4a5568" stroke-width="1.5"/>
      <text x="758" y="748">10</text>
    </g>

    <!-- Y-axis ticks -->
    <g id="yTicks2" font-family="IBM Plex Mono" font-size="20" fill="#4a5568" text-anchor="end">
      <line x1="194" y1="604" x2="206" y2="604" stroke="#4a5568" stroke-width="1.5"/>
      <text x="188" y="610">4</text>
      <line x1="194" y1="488" x2="206" y2="488" stroke="#4a5568" stroke-width="1.5"/>
      <text x="188" y="494">6</text>
      <line x1="194" y1="372" x2="206" y2="372" stroke="#4a5568" stroke-width="1.5"/>
      <text x="188" y="378">8</text>
      <line x1="194" y1="256" x2="206" y2="256" stroke="#4a5568" stroke-width="1.5"/>
      <text x="188" y="262">10</text>
    </g>

    <!-- Three decision lines (all visible, dimmed initially) -->
    <line id="p2line1" x1="448" y1="140" x2="448" y2="720" stroke="#3b82f6" stroke-width="2.5" opacity="0.4"/>
    <line id="p2line2" x1="200" y1="546" x2="820" y2="546" stroke="#8b5cf6" stroke-width="2.5" opacity="0.4"/>
    <line id="p2line3" x1="262" y1="200" x2="780" y2="720" stroke="#06b6d4" stroke-width="2.5" opacity="0.4"/>

    <!-- Pass region: right of L1 (x>448), above L2 (y<546), above L3 diagonal -->
    <!-- This creates a polygon where green dots cluster -->
    <polygon id="passRegion" points="448,387 448,140 820,140 820,546 607,546" fill="#10b981" opacity="0"/>

    <!-- Data dots phase 2 (shifted to match phase 2 axes) -->
    <!-- x scale: 200 + (val/10)*620, y scale: 720 - (val/10)*580 -->
    <g id="dataDots2">
      <!-- Green pass dots -->
      <circle class="dotGreen2" cx="572" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 6,8 -->
      <circle class="dotGreen2" cx="634" cy="256" r="8" fill="#10b981" opacity="0.8"/><!-- 7,10 -->
      <circle class="dotGreen2" cx="510" cy="430" r="8" fill="#10b981" opacity="0.8"/><!-- 5,7 -->
      <circle class="dotGreen2" cx="696" cy="314" r="8" fill="#10b981" opacity="0.8"/><!-- 8,9 -->
      <circle class="dotGreen2" cx="758" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 9,8 -->
      <circle class="dotGreen2" cx="634" cy="430" r="8" fill="#10b981" opacity="0.8"/><!-- 7,7 -->
      <circle class="dotGreen2" cx="696" cy="488" r="8" fill="#10b981" opacity="0.8"/><!-- 8,6 -->
      <circle class="dotGreen2" cx="510" cy="314" r="8" fill="#10b981" opacity="0.8"/><!-- 5,9 -->
      <circle class="dotGreen2" cx="572" cy="488" r="8" fill="#10b981" opacity="0.8"/><!-- 6,6 -->
      <circle class="dotGreen2" cx="448" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 4,8 -->
      <circle class="dotGreen2" cx="758" cy="256" r="8" fill="#10b981" opacity="0.8"/><!-- 9,10 -->
      <circle class="dotGreen2" cx="634" cy="372" r="8" fill="#10b981" opacity="0.8"/><!-- 7,8 -->

      <!-- Red fail dots -->
      <circle class="dotRed2" cx="262" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,4 -->
      <circle class="dotRed2" cx="324" cy="662" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,3 -->
      <circle class="dotRed2" cx="262" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,5 -->
      <circle class="dotRed2" cx="386" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 3,4 -->
      <circle class="dotRed2" cx="324" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,5 -->
      <circle class="dotRed2" cx="262" cy="430" r="8" fill="#ef4444" opacity="0.8"/><!-- 1,7 -->
      <circle class="dotRed2" cx="386" cy="662" r="8" fill="#ef4444" opacity="0.8"/><!-- 3,3 -->
      <circle class="dotRed2" cx="448" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 4,4 -->
      <circle class="dotRed2" cx="324" cy="430" r="8" fill="#ef4444" opacity="0.8"/><!-- 2,7 -->
      <circle class="dotRed2" cx="448" cy="546" r="8" fill="#ef4444" opacity="0.8"/><!-- 4,5 -->
      <circle class="dotRed2" cx="510" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 5,4 -->
      <circle class="dotRed2" cx="696" cy="604" r="8" fill="#ef4444" opacity="0.8"/><!-- 8,4 -->
    </g>

    <!-- Logic badge -->
    <g id="logicBadge">
      <rect x="960" y="130" width="460" height="80" rx="14" fill="#151d30" stroke="#f97316" stroke-width="2.5"/>
      <text x="1190" y="162" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">Output logic:</text>
      <text x="1190" y="194" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#f97316">IF H&#x2081; high AND H&#x2083; high &#x2192; PASS</text>
    </g>

    <!-- Output neuron icon -->
    <g id="outputNeuron">
      <circle cx="1190" cy="320" r="40" fill="#151d30" stroke="#f97316" stroke-width="3"/>
      <text x="1190" y="328" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#f97316">Out</text>
      <circle id="outPulse" cx="1190" cy="320" r="40" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0" filter="url(#pulseGlow)"/>
    </g>

    <!-- Small neuron inputs feeding into output -->
    <g id="miniNeurons">
      <circle cx="1000" cy="260" r="22" fill="#151d30" stroke="#3b82f6" stroke-width="2"/>
      <text x="1000" y="268" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#3b82f6">H&#x2081;</text>
      <line x1="1022" y1="268" x2="1150" y2="310" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

      <circle cx="1000" cy="320" r="22" fill="#151d30" stroke="#8b5cf6" stroke-width="2"/>
      <text x="1000" y="328" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8b5cf6">H&#x2082;</text>
      <line x1="1022" y1="320" x2="1150" y2="320" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>

      <circle cx="1000" cy="380" r="22" fill="#151d30" stroke="#06b6d4" stroke-width="2"/>
      <text x="1000" y="388" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#06b6d4">H&#x2083;</text>
      <line x1="1022" y1="372" x2="1150" y2="330" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- Weight annotations on connections -->
    <g id="weightLabels">
      <text x="1080" y="278" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#3b82f6">high</text>
      <text x="1080" y="312" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8b5cf6">low</text>
      <text x="1080" y="362" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#06b6d4">high</text>
    </g>

    <!-- Region description badge -->
    <g id="regionBadge">
      <rect x="960" y="430" width="460" height="60" rx="12" fill="#151d30" stroke="#10b981" stroke-width="2"/>
      <text x="1190" y="468" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#10b981">Bounded region, not a single line</text>
    </g>

    <!-- Comparison panel -->
    <g id="comparison">
      <rect x="960" y="540" width="460" height="240" rx="14" fill="#151d30" stroke="#4a5568" stroke-width="2"/>

      <!-- Left: single neuron -->

<!-- Subtitles -->
<div class="narration-sub" id="sub"></div>

<script>
gsap.registerPlugin(MotionPathPlugin);

// ── Subtitle engine ──
var T0 = performance.now();
// Line 1 (0-23685ms): 57 words, ~415.5ms/word
// Line 2 (24637-46348ms): 59 words, ~367.98ms/word
var subs = [
  {"start": 0, "end": 2909, "text": "What are those hidden neurons actually doing?"},
  {"start": 2909, "end": 9555, "text": "Each one draws a straight line in the input space, just like a single neuron would."},
  {"start": 9555, "end": 11633, "text": "But they draw different lines."},
  {"start": 11633, "end": 16618, "text": "One might learn to separate \u2018studied a lot\u2019 from \u2018didn\u2019t study enough.\u2019"},
  {"start": 16618, "end": 19526, "text": "Another separates \u2018well rested\u2019 from \u2018sleep deprived.\u2019"},
  {"start": 19526, "end": 23685, "text": "A third captures a diagonal \u2014 some combination of both factors."},
  {"start": 24637, "end": 27213, "text": "The output neuron then combines those responses."},
  {"start": 27213, "end": 32733, "text": "It learns to say: activate when neuron one is high and neuron three is high."},
  {"start": 32733, "end": 38623, "text": "That combination creates a region in the data \u2014 not a single line, but a bounded area."},
  {"start": 38623, "end": 40832, "text": "The boundary has corners and edges."},
  {"start": 40832, "end": 46348, "text": "It\u2019s not smooth, but it\u2019s already more complex than anything a single neuron could draw."}
];
(function tick() {
  var t = performance.now() - (window.T0_override || T0);
  var el = document.getElementById("sub");
  var active = null;
  for (var i = 0; i < subs.length; i++) {
    if (t >= subs[i].start && t < subs[i].end) { active = subs[i].text; break; }
  }
  el.textContent = active || '';
  el.style.opacity = active ? '1' : '0';
  requestAnimationFrame(tick);
})();

// ── Initial states: Phase 1 ──
gsap.set("#p1Title", { opacity: 0, y: 14 });
gsap.set("#plotBg", { opacity: 0 });
gsap.set("#xAxis, #yAxis", { opacity: 0 });
gsap.set("#xLabel, #yLabel", { opacity: 0 });
gsap.set("#xTicks, #yTicks", { opacity: 0 });

gsap.set(".dotGreen, .dotRed", { scale: 0, svgOrigin: "0 0" });

gsap.set("#neuron2Icon", { opacity: 0, scale: 0.85, svgOrigin: "280 430" });
gsap.set("#neuron3Icon", { opacity: 0, scale: 0.85, svgOrigin: "280 580" });
gsap.set("#conn1, #conn2, #conn3", { opacity: 0 });
gsap.set("#label1", { opacity: 0, x: 14 });
gsap.set("#label2", { opacity: 0, x: 14 });
gsap.set("#label3", { opacity: 0, x: 14 });
gsap.set("#oneLineBadge", { opacity: 0, y: 10 });

// ── Initial states: Phase 2 ──
gsap.set("#phase2", { opacity: 0 });
gsap.set("#p2Title", { opacity: 0, y: 14 });
gsap.set("#plotBg2", { opacity: 0 });
gsap.set("#xAxis2, #yAxis2", { opacity: 0 });
gsap.set("#xLabel2, #yLabel2", { opacity: 0 });
gsap.set("#xTicks2, #yTicks2", { opacity: 0 });
gsap.set("#dataDots2", { opacity: 0 });
gsap.set("#p2line1, #p2line2, #p2line3", { opacity: 0 });

gsap.set("#logicBadge", { opacity: 0, y: 14 });
gsap.set("#outputNeuron", { opacity: 0, scale: 0.85, svgOrigin: "1190 320" });
gsap.set("#miniNeurons", { opacity: 0 });
gsap.set("#weightLabels", { opacity: 0 });
gsap.set("#regionBadge", { opacity: 0, y: 10 });
gsap.set("#comparison", { opacity: 0, y: 14 });
gsap.set("#cornersBadge", { opacity: 0, y: 10 });

// ── Ambient breathing ──
gsap.to("#n1Pulse", {
  scale: 1.5, opacity: 0, svgOrigin: "280 280",
  duration: 2.5, ease: "power1.out", repeat: -1, repeatDelay: 1.5
});
gsap.to("#n2Pulse", {
  scale: 1.5, opacity: 0, svgOrigin: "280 430",
  duration: 2.8, ease: "power1.out", repeat: -1, repeatDelay: 1.8
});
gsap.to("#n3Pulse", {
  scale: 1.5, opacity: 0, svgOrigin: "280 580",
  duration: 2.6, ease: "power1.out", repeat: -1, repeatDelay: 1.6
});

// ── Set individual dot transforms for stagger ──
var greenDots = document.querySelectorAll(".dotGreen");
var redDots = document.querySelectorAll(".dotRed");
for (var i = 0; i < greenDots.length; i++) {
  var cx = greenDots[i].getAttribute("cx");
  var cy = greenDots[i].getAttribute("cy");
  gsap.set(greenDots[i], { scale: 0, svgOrigin: cx + " " + cy });
}
for (var i = 0; i < redDots.length; i++) {
  var cx = redDots[i].getAttribute("cx");
  var cy = redDots[i].getAttribute("cy");
  gsap.set(redDots[i], { scale: 0, svgOrigin: cx + " " + cy });
}

// ── Master timeline ──
var tl = gsap.timeline();

// ═══════════════════════════════════════════════════════
// PHASE 1: Subs 1-6 (0 - 23.7s)
// Three hidden neuron lines on scatter plot
// ═══════════════════════════════════════════════════════

// Sub 1 (0-2.9s): "What are those hidden neurons actually doing?"
tl.to("#p1Title", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.2)
  .to("#plotBg", { opacity: 0.5, duration: 0.5, ease: "power2.out" }, 0.4)
  .to("#xAxis, #yAxis", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.6)
  .to("#xLabel, #yLabel", { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.8)
  .to("#xTicks, #yTicks", { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.9)

// Sub 2 (2.9-9.6s): "Each one draws a straight line in the input space..."
  // Show data dots with stagger
  .to("#dataDots", { opacity: 1, duration: 0.01 }, 3.0)
  .to(".dotGreen", { scale: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 3.0)
  .to(".dotRed", { scale: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 3.3)
  // Show first neuron icon as "each one draws a line" is said
  .to("#neuron1Icon", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.3)" }, 5.0)
  .call(function() { gsap.set("#n1Pulse", { opacity: 0.3 }); }, null, 5.0)
  .to("#conn1", { opacity: 0.4, duration: 0.3, ease: "power2.out" }, 5.2)
  // Line 1 self-draws (near-vertical, study threshold)
  .to("#line1", { strokeDashoffset: 0, duration: 1.2, ease: "power1.inOut" }, 5.5)

// Sub 3 (9.6-11.6s): "But they draw different lines."
  // Show neuron 2 icon
  .to("#neuron2Icon", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.3)" }, 9.6)
  .call(function() { gsap.set("#n2Pulse", { opacity: 0.3 }); }, null, 9.6)
  .to("#neuron3Icon", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.3)" }, 10.0)
  .call(function() { gsap.set("#n3Pulse", { opacity: 0.3 }); }, null, 10.0)

// Sub 4 (11.6-16.6s): "One might learn to separate 'studied a lot' from 'didn't study enough.'"
  // Label for line 1
  .to("#label1", { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 11.8)
  // Pulse line 1 brighter
  .to("#line1", { stroke: "#60a5fa", duration: 0.3, ease: "power2.out" }, 12.0)
  .to("#line1", { stroke: "#3b82f6", duration: 0.6 }, 12.5)

// Sub 5 (16.6-19.5s): "Another separates 'well rested' from 'sleep deprived.'"
  .to("#conn2", { opacity: 0.4, duration: 0.3, ease: "power2.out" }, 16.6)
  // Line 2 self-draws (near-horizontal, sleep threshold)
  .to("#line2", { strokeDashoffset: 0, duration: 1.0, ease: "power1.inOut" }, 16.8)
  .to("#label2", { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 17.5)

// Sub 6 (19.5-23.7s): "A third captures a diagonal -- some combination of both factors."
  .to("#conn3", { opacity: 0.4, duration: 0.3, ease: "power2.out" }, 19.6)
  // Line 3 self-draws (diagonal)
  .to("#line3", { strokeDashoffset: 0, duration: 1.2, ease: "power1.inOut" }, 19.8)
  .to("#label3", { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 20.5)
  // "Each neuron = one line" badge
  .to("#oneLineBadge", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 21.5)

// ═══════════════════════════════════════════════════════
// Phase transition (~23.7 - 25s)
// ═══════════════════════════════════════════════════════
  .to("#phase1", { opacity: 0, duration: 0.5, ease: "power2.out" }, 23.8)
  .to("#phaseCover", { opacity: 1, duration: 0.4 }, 24.0)
  .to("#phase2", { opacity: 1, duration: 0.01 }, 24.4)
  .to("#phaseCover", { opacity: 0, duration: 0.01 }, 24.4)

// ═══════════════════════════════════════════════════════
// PHASE 2: Subs 7-11 (24.6 - 46.3s)
// Region combination
// ═══════════════════════════════════════════════════════

// Sub 7 (24.6-27.2s): "The output neuron then combines those responses."
  .to("#p2Title", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 24.6)
  .to("#plotBg2", { opacity: 0.5, duration: 0.4 }, 24.7)
  .to("#xAxis2, #yAxis2", { opacity: 1, duration: 0.3 }, 24.8)
  .to("#xLabel2, #yLabel2", { opacity: 1, duration: 0.3 }, 24.9)
  .to("#xTicks2, #yTicks2", { opacity: 1, duration: 0.3 }, 25.0)
  .to("#dataDots2", { opacity: 1, duration: 0.4 }, 25.0)
  .to("#p2line1, #p2line2, #p2line3", { opacity: 0.4, duration: 0.5 }, 25.1)
  // Output neuron appears
  .to("#outputNeuron", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)" }, 25.5)
  .call(function() {
    gsap.set("#outPulse", { opacity: 0.3 });
    gsap.to("#outPulse", {
      scale: 1.4, opacity: 0, svgOrigin: "1190 320",
      duration: 2.0, ease: "power1.out", repeat: -1, repeatDelay: 1.5
    });
  }, null, 25.8)

// Sub 8 (27.2-32.7s): "It learns to say: activate when neuron one is high and neuron three is high."
  .to("#miniNeurons", { opacity: 1, duration: 0.5, ease: "power2.out" }, 27.3)
  .to("#weightLabels", { opacity: 1, duration: 0.4, ease: "power2.out" }, 27.8)
  .to("#logicBadge", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 28.5)
  // Highlight H1 connection brighter
  .to("#p2line1", { opacity: 0.8, stroke: "#60a5fa", duration: 0.4 }, 29.5)
  .to("#p2line1", { stroke: "#3b82f6", duration: 0.6 }, 30.0)
  // Highlight H3 connection brighter
  .to("#p2line3", { opacity: 0.8, stroke: "#22d3ee", duration: 0.4 }, 31.0)
  .to("#p2line3", { stroke: "#06b6d4", duration: 0.6 }, 31.5)

// Sub 9 (32.7-38.6s): "That combination creates a region in the data -- not a single line, but a bounded area."
  // Fill the triangular pass region
  .to("#passRegion", { opacity: 0.15, duration: 1.2, ease: "power2.out" }, 33.0)
  // Pulse the region border
  .to("#p2line1", { opacity: 0.7, duration: 0.3 }, 34.0)
  .to("#p2line3", { opacity: 0.7, duration: 0.3 }, 34.0)
  // Region badge
  .to("#regionBadge", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 35.5)
  // Make region more visible
  .to("#passRegion", { opacity: 0.25, duration: 0.8, ease: "power2.out" }, 36.0)

// Sub 10 (38.6-40.8s): "The boundary has corners and edges."
  .to("#cornersBadge", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 38.8)
  // Flash the boundary lines
  .to("#p2line1", { attr: { "stroke-width": 4 }, duration: 0.3 }, 39.2)
  .to("#p2line3", { attr: { "stroke-width": 4 }, duration: 0.3 }, 39.2)
  .to("#p2line1", { attr: { "stroke-width": 2.5 }, duration: 0.5 }, 39.8)
  .to("#p2line3", { attr: { "stroke-width": 2.5 }, duration: 0.5 }, 39.8)

// Sub 11 (40.8-46.3s): "It's not smooth, but it's already more complex than anything a single neuron could draw."
  .to("#comparison", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 41.0)
  // Pulse the region one more time for emphasis
  .to("#passRegion", { opacity: 0.35, duration: 0.5, ease: "sine.inOut" }, 43.0)
  .to("#passRegion", { opacity: 0.25, duration: 0.5, ease: "sine.inOut" }, 43.5);

// ── Set svgOrigin for phase 2 dots ──
var greenDots2 = document.querySelectorAll(".dotGreen2");
var redDots2 = document.querySelectorAll(".dotRed2");
for (var j = 0; j < greenDots2.length; j++) {
  var cx2 = greenDots2[j].getAttribute("cx");
  var cy2 = greenDots2[j].getAttribute("cy");
  gsap.set(greenDots2[j], { svgOrigin: cx2 + " " + cy2 });
}
for (var j = 0; j < redDots2.length; j++) {
  var cx2 = redDots2[j].getAttribute("cx");
  var cy2 = redDots2[j].getAttribute("cy");
  gsap.set(redDots2[j], { svgOrigin: cx2 + " " + cy2 });
}

// ── Ambient: data dot subtle pulse ──
gsap.to(".dotGreen", {
  scale: 1.1, duration: 2.0, ease: "sine.inOut", yoyo: true, repeat: -1,
  stagger: { each: 0.15, from: "random" }
});
gsap.to(".dotRed", {
  scale: 1.1, duration: 2.2, ease: "sine.inOut", yoyo: true, repeat: -1,
  stagger: { each: 0.15, from: "random" }
});
gsap.to(".dotGreen2", {
  scale: 1.1, duration: 2.0, ease: "sine.inOut", yoyo: true, repeat: -1,
  stagger: { each: 0.15, from: "random" }
});
gsap.to(".dotRed2", {
  scale: 1.1, duration: 2.2, ease: "sine.inOut", yoyo: true, repeat: -1,
  stagger: { each: 0.15, from: "random" }
});

</script>
