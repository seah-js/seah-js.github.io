<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Scene 11 - Recap and What's Next</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root {
  --bg: #0b0f1a; --surface: #151d30; --text: #e8ecf4;
  --muted: #8892a8; --dim: #4a5568; --accent: #f97316;
  --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444;
  --green: #10b981; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  width: 1920px; height: 1080px; overflow: hidden; position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1000;
}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<svg id="mainSvg" width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0;">
  <defs>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="landscapeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0b0f1a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ballGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="part3Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- OBS background rect -->
  <rect width="1920" height="1080" fill="#0b0f1a"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Recap Diagram (0 - 28.2s)                          -->
  <!-- Left: Network diagram | Right: Decision boundary progression -->
  <!-- ============================================================ -->
  <g id="phase1">

    <!-- Scene title -->
    <text id="p1Title" x="960" y="52" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">Recap: Part 2</text>

    <!-- ====== LEFT SIDE: Canonical Network Diagram ====== -->
    <g id="netDiagram">
      <rect x="80" y="72" width="860" height="780" rx="18" fill="#151d30" opacity="0.5"/>

      <!-- Layer labels at top -->
      <text id="lblInput" x="210" y="112" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Input</text>
      <text id="lblHidden" x="500" y="112" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Hidden</text>
      <text id="lblOutput" x="790" y="112" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Output</text>

      <!-- Input layer: 2 nodes -->
      <g id="inputLayer">
        <circle cx="210" cy="320" r="28" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
        <text x="210" y="328" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x1</text>
        <circle cx="210" cy="480" r="28" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
        <text x="210" y="488" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x2</text>
      </g>

      <!-- Connections: input to hidden -->
      <g id="connIH" opacity="0.3">
        <line x1="238" y1="320" x2="462" y2="250" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="320" x2="462" y2="350" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="320" x2="462" y2="450" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="320" x2="462" y2="550" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="480" x2="462" y2="250" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="480" x2="462" y2="350" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="480" x2="462" y2="450" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="238" y1="480" x2="462" y2="550" stroke="#3b82f6" stroke-width="1.5"/>
      </g>

      <!-- Hidden layer: 4 neurons -->
      <g id="hiddenLayer">
        <circle cx="500" cy="250" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
        <circle cx="500" cy="350" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
        <circle cx="500" cy="450" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
        <circle cx="500" cy="550" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      </g>

      <!-- Weight labels on connections (visible in phase 1, turn to ? in phase 2) -->
      <g id="weightLabels" font-family="IBM Plex Mono" font-size="20" fill="#4a5568">
        <text id="w1" x="340" y="270" text-anchor="middle">0.5</text>
        <text id="w2" x="350" y="342" text-anchor="middle">-0.3</text>
        <text id="w3" x="340" y="404" text-anchor="middle">0.8</text>
        <text id="w4" x="350" y="460" text-anchor="middle">1.2</text>
        <text id="w5" x="340" y="512" text-anchor="middle">-0.7</text>
        <text id="w6" x="360" y="382" text-anchor="middle">0.4</text>
      </g>

      <!-- Connections: hidden to output -->
      <g id="connHO" opacity="0.3">
        <line x1="524" y1="250" x2="762" y2="400" stroke="#f97316" stroke-width="1.5"/>
        <line x1="524" y1="350" x2="762" y2="400" stroke="#f97316" stroke-width="1.5"/>
        <line x1="524" y1="450" x2="762" y2="400" stroke="#f97316" stroke-width="1.5"/>
        <line x1="524" y1="550" x2="762" y2="400" stroke="#f97316" stroke-width="1.5"/>
      </g>

      <!-- Output layer: 1 node -->
      <g id="outputLayer">
        <circle cx="790" cy="400" r="28" fill="#151d30" stroke="#f97316" stroke-width="2.5"/>
        <text x="790" y="408" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#f97316">y</text>
      </g>

      <!-- Forward pass arrow -->
      <g id="forwardArrow">
        <line x1="140" y1="700" x2="820" y2="700" stroke="#f97316" stroke-width="2.5" stroke-dasharray="12,6"/>
        <polygon points="830,700 815,692 815,708" fill="#f97316"/>
        <text x="480" y="736" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#f97316">Forward Pass</text>
      </g>

      <!-- "Straight lines" callout -->
      <g id="straightCallout">
        <rect x="200" y="776" width="560" height="48" rx="12" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <text x="480" y="808" text-anchor="middle" font-family="Outfit" font-weight="400" font-size="22" fill="#3b82f6">Each hidden neuron = one straight line</text>
      </g>
    </g>

    <!-- ====== RIGHT SIDE: Decision Boundary Progression ====== -->
    <g id="boundaryProg">
      <rect x="980" y="72" width="860" height="780" rx="18" fill="#151d30" opacity="0.5"/>
      <text id="progTitle" x="1410" y="112" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Decision Boundaries</text>

      <!-- Stage 1: 1 neuron = single line -->
      <g id="stage1">
        <rect x="1010" y="132" width="390" height="310" rx="14" fill="#0b0f1a" stroke="#4a5568" stroke-width="1.5"/>
        <text x="1205" y="164" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">1 Neuron</text>
        <!-- Scatter dots -->
        <circle cx="1060" cy="220" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1100" cy="250" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1080" cy="300" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1120" cy="340" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1140" cy="280" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1260" cy="210" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1300" cy="260" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1280" cy="330" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1320" cy="290" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1340" cy="370" r="6" fill="#ef4444" opacity="0.7"/>
        <!-- Single decision line -->
        <line x1="1190" y1="178" x2="1190" y2="430" stroke="#3b82f6" stroke-width="2.5"/>
      </g>

      <!-- Stage 2: 1 hidden layer = polygon -->
      <g id="stage2">
        <rect x="1430" y="132" width="390" height="310" rx="14" fill="#0b0f1a" stroke="#4a5568" stroke-width="1.5"/>
        <text x="1625" y="164" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">1 Hidden Layer</text>
        <!-- Scatter dots -->
        <circle cx="1530" cy="270" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1560" cy="300" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1545" cy="330" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1580" cy="290" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1480" cy="220" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1500" cy="380" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1700" cy="250" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1720" cy="350" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1660" cy="400" r="6" fill="#ef4444" opacity="0.7"/>
        <!-- Polygonal boundary (3 straight edges) -->
        <path d="M1500,200 L1610,350 L1500,400 Z" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
      </g>

      <!-- Stage 3: 2 hidden layers = complex region -->
      <g id="stage3">
        <rect x="1010" y="470" width="390" height="310" rx="14" fill="#0b0f1a" stroke="#4a5568" stroke-width="1.5"/>
        <text x="1205" y="502" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">2 Hidden Layers</text>
        <!-- Scatter dots -->
        <circle cx="1120" cy="600" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1150" cy="630" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1130" cy="660" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1170" cy="620" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1200" cy="590" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1250" cy="720" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1060" cy="560" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1300" cy="550" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1340" cy="680" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1080" cy="740" r="6" fill="#ef4444" opacity="0.7"/>
        <!-- Complex polygon with concavity -->
        <path d="M1090,570 L1200,540 L1310,580 L1290,700 L1200,740 L1090,700 Z" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
      </g>

      <!-- Stage 4: 3 hidden layers = smooth curve -->
      <g id="stage4">
        <rect x="1430" y="470" width="390" height="310" rx="14" fill="#0b0f1a" stroke="#4a5568" stroke-width="1.5"/>
        <text x="1625" y="502" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">3 Hidden Layers</text>
        <!-- Scatter dots -->
        <circle cx="1550" cy="610" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1580" cy="640" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1570" cy="670" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1610" cy="620" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1630" cy="660" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1560" cy="580" r="6" fill="#10b981" opacity="0.7"/>
        <circle cx="1470" cy="560" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1740" cy="580" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1720" cy="720" r="6" fill="#ef4444" opacity="0.7"/>
        <circle cx="1480" cy="720" r="6" fill="#ef4444" opacity="0.7"/>
        <!-- Smooth curved boundary -->
        <ellipse cx="1590" cy="635" rx="100" ry="75" fill="none" stroke="#f97316" stroke-width="2.5" transform="rotate(-10 1590 635)"/>
      </g>

      <!-- Progression arrow -->
      <g id="progArrow">
        <text x="1410" y="828" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">More depth</text>
        <line x1="1300" y1="840" x2="1500" y2="840" stroke="#f97316" stroke-width="2.5"/>
        <polygon points="1510,840 1495,832 1495,848" fill="#f97316"/>
        <text x="1560" y="848" text-anchor="start" font-family="Outfit" font-weight="500" font-size="22" fill="#f97316">curves</text>
      </g>
    </g>

    <!-- Layer highlight rings (activated during narration) -->
    <circle id="hlInput1" cx="210" cy="320" r="36" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlInput2" cx="210" cy="480" r="36" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlHidden1" cx="500" cy="250" r="32" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlHidden2" cx="500" cy="350" r="32" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlHidden3" cx="500" cy="450" r="32" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlHidden4" cx="500" cy="550" r="32" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>
    <circle id="hlOutput" cx="790" cy="400" r="36" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0"/>

    <!-- Forward pass pulse dot -->
    <circle id="pulseDot" cx="140" cy="400" r="8" fill="#f97316" filter="url(#pulseGlow)" opacity="0"/>
  </g>

  <!-- ============================================================ -->
  <!-- Cover rect for phase transition                              -->
  <!-- ============================================================ -->
  <rect id="phaseCover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Teaser for Part 3 (29.0 - 51.3s)                   -->
  <!-- Weight ?s, loss landscape, series roadmap                    -->
  <!-- ============================================================ -->
  <g id="phase2">

    <!-- Network diagram (smaller, centered top-left) with question mark weights -->
    <g id="p2Net">
      <rect x="80" y="60" width="700" height="480" rx="18" fill="#151d30" opacity="0.5"/>
      <text id="p2NetTitle" x="430" y="100" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#8892a8">The Weight Problem</text>

      <!-- Input nodes -->
      <circle cx="180" cy="260" r="24" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
      <text x="180" y="268" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x1</text>
      <circle cx="180" cy="400" r="24" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
      <text x="180" y="408" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x2</text>

      <!-- Connections input to hidden -->
      <g opacity="0.3">
        <line x1="204" y1="260" x2="376" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="260" x2="376" y2="290" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="260" x2="376" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="260" x2="376" y2="470" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="400" x2="376" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="400" x2="376" y2="290" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="400" x2="376" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="204" y1="400" x2="376" y2="470" stroke="#3b82f6" stroke-width="1.5"/>
      </g>

      <!-- Hidden neurons -->
      <circle cx="400" cy="200" r="22" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="400" cy="290" r="22" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="400" cy="380" r="22" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="400" cy="470" r="22" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>

      <!-- Animated question marks replacing weight labels -->
      <g id="qMarks" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#f97316">
        <text id="q1" x="280" y="220" text-anchor="middle">?</text>
        <text id="q2" x="290" y="280" text-anchor="middle">?</text>
        <text id="q3" x="280" y="340" text-anchor="middle">?</text>
        <text id="q4" x="290" y="400" text-anchor="middle">?</text>
        <text id="q5" x="280" y="310" text-anchor="middle">?</text>
        <text id="q6" x="290" y="370" text-anchor="middle">?</text>
        <text id="q7" x="280" y="440" text-anchor="middle">?</text>
        <text id="q8" x="290" y="460" text-anchor="middle">?</text>
      </g>

      <!-- Connections hidden to output -->
      <g opacity="0.3">
        <line x1="422" y1="200" x2="596" y2="335" stroke="#f97316" stroke-width="1.5"/>
        <line x1="422" y1="290" x2="596" y2="335" stroke="#f97316" stroke-width="1.5"/>
        <line x1="422" y1="380" x2="596" y2="335" stroke="#f97316" stroke-width="1.5"/>
        <line x1="422" y1="470" x2="596" y2="335" stroke="#f97316" stroke-width="1.5"/>
      </g>

      <!-- Output node -->
      <circle cx="620" cy="335" r="24" fill="#151d30" stroke="#f97316" stroke-width="2.5"/>
      <text x="620" y="343" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#f97316">y</text>

      <!-- More question marks on hidden-to-output -->
      <g id="qMarks2" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#f97316">
        <text id="q9" x="510" y="260" text-anchor="middle">?</text>
        <text id="q10" x="520" y="310" text-anchor="middle">?</text>
        <text id="q11" x="510" y="365" text-anchor="middle">?</text>
        <text id="q12" x="520" y="410" text-anchor="middle">?</text>
      </g>
    </g>

    <!-- Loss Landscape (right side) -->
    <g id="lossLandscape">
      <rect x="820" y="60" width="1020" height="480" rx="18" fill="#151d30" opacity="0.5"/>
      <text id="landscapeTitle" x="1330" y="100" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#8892a8">Loss Landscape</text>

      <!-- 3D-like surface using layered paths -->
      <!-- Back ridge -->
      <path id="ridge1" d="M880,320 C960,200 1060,340 1140,260 C1220,180 1300,310 1380,230 C1460,150 1540,280 1620,220 C1700,160 1760,240 1780,260"
        fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
      <!-- Mid surface line -->
      <path id="ridge2" d="M880,380 C960,280 1060,400 1140,330 C1220,260 1300,370 1380,300 C1460,230 1540,340 1620,290 C1700,240 1760,310 1780,320"
        fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
      <!-- Front ridge -->
      <path id="ridge3" d="M880,440 C960,360 1060,450 1140,400 C1220,350 1300,420 1380,370 C1460,320 1540,400 1620,360 C1700,320 1760,370 1780,380"
