<!DOCTYPE html>
<html lang="en">
<head>

<title>Scene 10 - Network Architecture</title>

<style>
:root {
  --bg: #0b0f1a; --surface: #151d30; --text: #e8ecf4;
  --muted: #8892a8; --dim: #4a5568; --accent: #f97316;
  --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444;
  --green: #10b981; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  width: 1920px; height: 1080px; overflow: hidden; position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1000;
}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<svg id="mainSvg" width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0;">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="wideGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- OBS background rect -->
  <rect width="1920" height="1080" fill="#0b0f1a"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Architecture Labels (0 - 25.7s)                    -->
  <!-- 2-64-64-1 network with depth/width/edge/param labels        -->
  <!-- ============================================================ -->
  <g id="phase1">

    <!-- Scene title -->
    <text id="p1Title" x="960" y="55" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">Network Architecture</text>

    <!-- Main network backdrop panel -->
    <rect id="netPanel" x="120" y="80" width="1680" height="680" rx="18" fill="#151d30" opacity="0.4"/>

    <!-- ====== NETWORK DIAGRAM: 2-64-64-1 ====== -->

    <!-- Layer column labels -->
    <text id="labelInput" x="280" y="130" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Input</text>
    <text id="labelHidden1" x="680" y="130" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Hidden 1</text>
    <text id="labelHidden2" x="1080" y="130" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Hidden 2</text>
    <text id="labelOutput" x="1480" y="130" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="22" fill="#8892a8">Output</text>

    <!-- INPUT LAYER: 2 neurons -->
    <g id="inputLayer">
      <circle cx="280" cy="320" r="28" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
      <text x="280" y="328" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x1</text>
      <circle cx="280" cy="480" r="28" fill="#151d30" stroke="#8892a8" stroke-width="2.5"/>
      <text x="280" y="488" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">x2</text>
    </g>

    <!-- HIDDEN LAYER 1: 8 representative neurons (stands for 64) -->
    <!-- Connections: input to hidden 1 -->
    <g id="connIH1" opacity="0.25">
      <line x1="308" y1="320" x2="652" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="260" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="320" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="440" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="500" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="560" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="320" x2="652" y2="620" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="260" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="320" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="380" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="440" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="500" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="560" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="308" y1="480" x2="652" y2="620" stroke="#3b82f6" stroke-width="1.5"/>
    </g>

    <g id="hidden1">
      <circle cx="680" cy="200" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="680" cy="260" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="680" cy="320" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="680" cy="380" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <!-- Ellipsis gap -->
      <text x="680" y="418" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="24" fill="#3b82f6">...</text>
      <circle cx="680" cy="440" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="680" cy="500" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>

      <!-- "64" badge -->
      <rect id="h1Badge" x="640" y="650" width="80" height="34" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
      <text x="680" y="674" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="20" fill="#3b82f6">64</text>
    </g>

    <!-- HIDDEN LAYER 2: 8 representative neurons (stands for 64) -->
    <!-- Connections: hidden 1 to hidden 2 -->
    <g id="connH1H2" opacity="0.15">
      <line x1="700" y1="200" x2="1052" y2="200" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="200" x2="1052" y2="320" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="200" x2="1052" y2="500" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="200" x2="1052" y2="620" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="320" x2="1052" y2="200" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="320" x2="1052" y2="320" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="320" x2="1052" y2="500" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="320" x2="1052" y2="620" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="500" x2="1052" y2="200" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="500" x2="1052" y2="320" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="500" x2="1052" y2="500" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="500" x2="1052" y2="620" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="620" x2="1052" y2="200" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="620" x2="1052" y2="320" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="620" x2="1052" y2="500" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="700" y1="620" x2="1052" y2="620" stroke="#8b5cf6" stroke-width="1.5"/>
    </g>

    <g id="hidden2">
      <circle cx="1080" cy="200" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="260" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="320" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="380" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <!-- Ellipsis gap -->
      <text x="1080" y="418" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="24" fill="#8b5cf6">...</text>
      <circle cx="1080" cy="440" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="500" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="560" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="1080" cy="620" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <!-- "64" badge -->
      <rect id="h2Badge" x="1040" y="650" width="80" height="34" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
      <text x="1080" y="674" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="20" fill="#8b5cf6">64</text>
    </g>

    <!-- OUTPUT LAYER: 1 neuron -->
    <!-- Connections: hidden 2 to output -->
    <g id="connH2O" opacity="0.25">
      <line x1="1100" y1="200" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="260" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="320" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="380" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="440" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="500" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="560" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
      <line x1="1100" y1="620" x2="1452" y2="400" stroke="#f97316" stroke-width="1.5"/>
    </g>

    <g id="outputLayer">
      <circle cx="1480" cy="400" r="28" fill="#151d30" stroke="#f97316" stroke-width="2.5"/>
      <text x="1480" y="408" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#f97316">y</text>
    </g>

    <!-- ====== ANNOTATION: Depth bracket (right side) ====== -->
    <g id="depthBracket">
      <!-- Vertical bracket line -->
      <line x1="1600" y1="170" x2="1600" y2="650" stroke="#06b6d4" stroke-width="2.5"/>
      <line x1="1590" y1="170" x2="1610" y2="170" stroke="#06b6d4" stroke-width="2.5"/>
      <line x1="1590" y1="650" x2="1610" y2="650" stroke="#06b6d4" stroke-width="2.5"/>
      <!-- Label -->
      <rect x="1630" y="380" width="170" height="44" rx="10" fill="#0b0f1a" stroke="#06b6d4" stroke-width="2"/>
      <text x="1715" y="410" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="22" fill="#06b6d4">Depth: 4</text>
    </g>

    <!-- ====== ANNOTATION: Width bracket (across Hidden 1) ====== -->
    <g id="widthBracket">
      <!-- Horizontal bracket line across hidden 1 -->
      <line x1="640" y1="160" x2="720" y2="160" stroke="#10b981" stroke-width="2.5"/>
      <line x1="640" y1="152" x2="640" y2="168" stroke="#10b981" stroke-width="2.5"/>
      <line x1="720" y1="152" x2="720" y2="168" stroke="#10b981" stroke-width="2.5"/>
      <!-- Label -->
      <rect x="730" y="143" width="200" height="38" rx="10" fill="#0b0f1a" stroke="#10b981" stroke-width="2"/>
      <text x="830" y="169" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#10b981">Width: 64</text>
    </g>

    <!-- ====== ANNOTATION: Edge label (on one connection) ====== -->
    <g id="edgeLabel">
      <!-- Highlight one specific edge from input to hidden1 -->
      <line id="highlightEdge" x1="308" y1="320" x2="652" y2="260" stroke="#f97316" stroke-width="3" opacity="0.9"/>
      <!-- Label on the edge -->
      <rect x="418" y="258" width="160" height="36" rx="8" fill="#0b0f1a" stroke="#f97316" stroke-width="2"/>
      <text x="498" y="283" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#f97316">Edge (w)</text>
    </g>

    <!-- ====== NOTATION: 2-64-64-1 ====== -->
    <g id="notation">
      <rect x="340" y="730" width="340" height="52" rx="14" fill="#151d30" stroke="#e8ecf4" stroke-width="2.5"/>
      <text x="510" y="764" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="28" fill="#e8ecf4">2 - 64 - 64 - 1</text>
    </g>

    <!-- ====== PARAMETER COUNTER ====== -->
    <g id="paramCounter">
      <rect x="780" y="730" width="360" height="52" rx="14" fill="#151d30" stroke="#8892a8" stroke-width="2"/>
      <text x="850" y="764" text-anchor="start" font-family="IBM Plex Mono" font-weight="400" font-size="22" fill="#8892a8">Params:</text>
      <text id="paramVal" x="980" y="764" text-anchor="start" font-family="IBM Plex Mono" font-weight="600" font-size="24" fill="#f97316">0</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Cover rect for phase transition                              -->
  <!-- ============================================================ -->
  <rect id="phaseCover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Scale Callback (26.5 - 41.7s)                      -->
  <!-- Small net zooms out, parameter counter climbs to 1.8T        -->
  <!-- ============================================================ -->
  <g id="phase2">

    <!-- Scene title -->
    <text id="p2Title" x="960" y="55" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">Scale</text>

    <!-- The small network (miniature version of phase 1 net) -->
    <g id="smallNet">
      <rect x="780" y="100" width="360" height="280" rx="14" fill="#151d30" opacity="0.5" stroke="#4a5568" stroke-width="1.5"/>
      <!-- Tiny 2-64-64-1 diagram -->
      <!-- Input -->
      <circle cx="830" cy="200" r="10" fill="#151d30" stroke="#8892a8" stroke-width="2"/>
      <circle cx="830" cy="280" r="10" fill="#151d30" stroke="#8892a8" stroke-width="2"/>
      <!-- Hidden 1 cluster -->
      <circle cx="920" cy="170" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="920" cy="190" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="920" cy="210" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="920" cy="230" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>

      <circle cx="920" cy="270" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="920" cy="290" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="920" cy="310" r="6" fill="#151d30" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Hidden 2 cluster -->
      <circle cx="1000" cy="170" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="190" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="210" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="230" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="250" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="270" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="290" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="1000" cy="310" r="6" fill="#151d30" stroke="#8b5cf6" stroke-width="1.5"/>
      <!-- Output -->
      <circle cx="1090" cy="240" r="10" fill="#151d30" stroke="#f97316" stroke-width="2"/>
      <!-- Some connection lines -->
      <line x1="840" y1="200" x2="914" y2="190" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="840" y1="200" x2="914" y2="230" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="840" y1="200" x2="914" y2="270" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="840" y1="280" x2="914" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="840" y1="280" x2="914" y2="250" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="840" y1="280" x2="914" y2="290" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
      <line x1="926" y1="190" x2="994" y2="190" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
      <line x1="926" y1="230" x2="994" y2="230" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
      <line x1="926" y1="270" x2="994" y2="270" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
      <line x1="926" y1="310" x2="994" y2="310" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
      <line x1="1006" y1="210" x2="1080" y2="240" stroke="#f97316" stroke-width="1.5" opacity="0.2"/>
      <line x1="1006" y1="250" x2="1080" y2="240" stroke="#f97316" stroke-width="1.5" opacity="0.2"/>

      <!-- Label -->
      <text x="960" y="365" text-anchor="middle" font-family="IBM Plex Mono" font-weight="500" font-size="20" fill="#8892a8">2-64-64-1</text>
      <text x="960" y="390" text-anchor="middle" font-family="IBM Plex Mono" font-weight="400" font-size="20" fill="#4a5568">8,385 params</text>
    </g>

    <!-- Dense cloud of connections (the massive network) -->
    <g id="massiveNet" opacity="0">
      <!-- Many tiny dots representing the massive scale -->
      <!-- Top-left cluster -->
      <circle cx="200" cy="160" r="3" fill="#3b82f6" opacity="0.4"/>
      <circle cx="230" cy="180" r="3" fill="#3b82f6" opacity="0.3"/>

      <circle cx="1630" cy="210" r="3" fill="#06b6d4" opacity="0.3"/>
      <circle cx="1700" cy="170" r="3" fill="#3b82f6" opacity="0.4"/>
      <circle cx="1660" cy="230" r="3" fill="#8b5cf6" opacity="0.3"/>
      <line x1="1650" y1="160" x2="1680" y2="190" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
