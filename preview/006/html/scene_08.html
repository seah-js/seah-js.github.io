}

}

        <line x1="1228" y1="400" x2="1380" y2="230" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
        <line x1="1228" y1="400" x2="1380" y2="270" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
        <line x1="1228" y1="400" x2="1380" y2="310" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
        <line x1="1228" y1="400" x2="1380" y2="350" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>

    <!-- Cybenko badge -->
    <g id="cybenkoBadge">
      <rect x="1120" y="700" width="680" height="64" rx="14" fill="#151d30" stroke="#f97316" stroke-width="2.5"/>

// Line 2 (23545-48762ms): 61 words, ~413.4ms/word

var subs = [
  {"start": 0, "end": 3994, "text": "In 1989, George Cybenko proved something remarkable."},
  {"start": 3994, "end": 14835, "text": "A neural network with just one hidden layer, given enough neurons, can approximate any continuous function to any desired accuracy."},
  {"start": 14835, "end": 15976, "text": "Any function."},
  {"start": 15976, "end": 19970, "text": "Classification, regression, probability distributions \u2014 all of it."},
  {"start": 19970, "end": 23394, "text": "This is the universal approximation theorem."},
  {"start": 23545, "end": 26439, "text": "So why use deep networks at all?"},
  {"start": 26439, "end": 28092, "text": "Because width is expensive."},
  {"start": 28092, "end": 34707, "text": "A single hidden layer can theoretically do it, but it might need thousands or millions of neurons."},
  {"start": 34707, "end": 36361, "text": "Depth is more efficient."},
  {"start": 36361, "end": 42562, "text": "A few layers of moderate width can represent the same functions with far fewer total parameters."},
  {"start": 42562, "end": 48762, "text": "Depth gives you composition \u2014 each layer transforms the previous layer\u2019s output, building increasingly abstract features."}
];
(function tick() {
  var t = performance.now() - (window.T0_override || T0);
  var el = document.getElementById("sub");
  var active = null;
  for (var i = 0; i < subs.length; i++) {
    if (t >= subs[i].start && t < subs[i].end) { active = subs[i].text; break; }

  el.textContent = active || '';
  el.style.opacity = active ? '1' : '0';
  requestAnimationFrame(tick);
})();

// PHASE 2: Subs 6-11 (23.5 - 48.8s)

  .to("#depthWinsBadge rect", { stroke: "#10b981", duration: 0.5 }, 47.5);
