<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 02 — Callback: One Neuron, One Line</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Outfit:wght@300;400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a; --surface: #151d30; --text: #e8ecf4;
    --muted: #8892a8; --dim: #4a5568; --accent: #f97316;
    --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444;
    --green: #10b981; --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); overflow: hidden; width: 1920px; height: 1080px; position: relative; }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:1000;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }
  .narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);font-family:'Outfit',sans-serif;}
</style>
</head>
<body>
<svg id="mainSVG" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Neuron body gradient -->
    <radialGradient id="neuronGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>

    <!-- Green dot glow gradient -->
    <radialGradient id="greenDotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </radialGradient>

    <!-- Red dot glow gradient -->
    <radialGradient id="redDotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </radialGradient>
  </defs>

  <!-- OBS background -->
  <rect width="1920" height="1080" fill="#0b0f1a"/>

  <!-- =============================== PHASE 1: Part 1 Callback (0-20s) =============================== -->
  <g id="phase1">

    <!-- Scene title -->
    <text id="sceneTitle" x="960" y="70" font-family="'Outfit', sans-serif" font-weight="600" font-size="32" fill="#8892a8" text-anchor="middle">One Neuron, One Line</text>

    <!-- ---- Neuron diagram (upper half: y=100-380) ---- -->
    <g id="neuronDiagram">
      <!-- Backdrop panel -->
      <rect id="neuronPanel" x="200" y="100" width="1520" height="300" rx="16" fill="#151d30" opacity="0.6"/>

      <!-- Input nodes -->
      <circle id="nIn1" cx="340" cy="190" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <text id="nIn1Label" x="340" y="196" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#3b82f6" text-anchor="middle" letter-spacing="1">x1</text>
      <circle id="nIn2" cx="340" cy="300" r="24" fill="#151d30" stroke="#3b82f6" stroke-width="2.5"/>
      <text id="nIn2Label" x="340" y="306" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#3b82f6" text-anchor="middle" letter-spacing="1">x2</text>

      <!-- Input label -->
      <text id="inputsLabel" x="340" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Inputs</text>

      <!-- Weight connections -->
      <line id="wLine1" x1="364" y1="190" x2="570" y2="230" stroke="#fb923c" stroke-width="2.5" opacity="0.7"/>
      <line id="wLine2" x1="364" y1="300" x2="570" y2="260" stroke="#fb923c" stroke-width="2.5" opacity="0.7"/>

      <!-- Weight labels -->
      <text id="wLabel1" x="460" y="200" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="1">w1</text>
      <text id="wLabel2" x="460" y="298" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="1">w2</text>

      <!-- Weights label -->
      <text id="weightsLabel" x="460" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Weights</text>

      <!-- Summation node -->
      <circle id="sumNode" cx="620" cy="245" r="30" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>
      <text x="620" y="254" font-family="'Instrument Serif', serif" font-size="30" fill="#8b5cf6" text-anchor="middle">&#x03A3;</text>
      <text id="sumLabel" x="620" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Sum</text>

      <!-- Arrow sum to bias -->
      <line x1="650" y1="245" x2="730" y2="245" stroke="#4a5568" stroke-width="2.5"/>
      <polygon points="725,238 738,245 725,252" fill="#4a5568"/>

      <!-- Bias node -->
      <rect id="biasNode" x="745" y="218" width="70" height="54" rx="10" fill="#151d30" stroke="#06b6d4" stroke-width="2.5"/>
      <text x="780" y="252" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#06b6d4" text-anchor="middle" letter-spacing="1">+ b</text>
      <text id="biasLabel" x="780" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Bias</text>

      <!-- Arrow bias to activation -->
      <line x1="815" y1="245" x2="895" y2="245" stroke="#4a5568" stroke-width="2.5"/>
      <polygon points="890,238 903,245 890,252" fill="#4a5568"/>

      <!-- Activation function node -->
      <circle id="actNode" cx="960" cy="245" r="32" fill="url(#neuronGrad)" stroke="#fb923c" stroke-width="2.5"/>
      <text x="960" y="252" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#e8ecf4" text-anchor="middle" font-weight="500">f(x)</text>
      <text id="actLabel" x="960" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Activation</text>

      <!-- Glow behind activation -->
      <ellipse id="actGlow" cx="960" cy="245" rx="50" ry="50" fill="#f97316" opacity="0.06" filter="url(#softGlow)"/>

      <!-- Arrow activation to output -->
      <line x1="992" y1="245" x2="1110" y2="245" stroke="#4a5568" stroke-width="2.5"/>
      <polygon points="1105,238 1118,245 1105,252" fill="#4a5568"/>

      <!-- Output node -->
      <circle id="outNode" cx="1160" cy="245" r="26" fill="#151d30" stroke="#10b981" stroke-width="2.5"/>
      <text x="1160" y="252" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#10b981" text-anchor="middle" letter-spacing="1">out</text>
      <text id="outLabel" x="1160" y="370" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#8892a8" text-anchor="middle">Output</text>

      <!-- Signal pulse dot that travels the neuron pipeline -->
      <circle id="signalDot" cx="340" cy="190" r="7" fill="#fbbf24" filter="url(#glowOrange)" opacity="0"/>
    </g>

    <!-- ---- Scatter plot (lower half: y=420-850) ---- -->
    <g id="scatterPlot">
      <!-- Backdrop panel -->
      <rect id="plotPanel" x="400" y="420" width="720" height="440" rx="12" fill="#151d30" opacity="0.5"/>

      <!-- Axes -->
      <line id="xAxis" x1="460" y1="810" x2="1060" y2="810" stroke="#4a5568" stroke-width="2.5"/>
      <line id="yAxis" x1="460" y1="810" x2="460" y2="460" stroke="#4a5568" stroke-width="2.5"/>

      <!-- Axis labels -->
      <text id="xAxisLabel" x="760" y="850" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#8892a8" text-anchor="middle">Hours Studied</text>
      <text id="yAxisLabel" x="420" y="635" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#8892a8" text-anchor="middle" transform="rotate(-90, 420, 635)">Hours Slept</text>

      <!-- Green dots (pass) - upper-right cluster -->
      <circle id="gDot1" cx="820" cy="520" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot2" cx="880" cy="540" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot3" cx="850" cy="490" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot4" cx="940" cy="510" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot5" cx="900" cy="480" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot6" cx="970" cy="540" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot7" cx="780" cy="500" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot8" cx="1000" cy="490" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="gDot9" cx="920" cy="470" r="10" fill="url(#greenDotGrad)" opacity="0.9"/>

      <!-- Red dots (fail) - lower-left cluster -->
      <circle id="rDot1" cx="530" cy="740" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot2" cx="580" cy="760" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot3" cx="560" cy="700" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot4" cx="620" cy="720" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot5" cx="500" cy="770" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot6" cx="640" cy="680" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot7" cx="550" cy="790" r="10" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="rDot8" cx="510" cy="710" r="10" fill="url(#redDotGrad)" opacity="0.9"/>

      <!-- Decision line (orange) -->
      <line id="decisionLine" x1="480" y1="580" x2="1040" y2="790" stroke="#f97316" stroke-width="3.5" stroke-dasharray="0" opacity="0"/>

      <!-- Decision line glow -->
      <line id="decisionLineGlow" x1="480" y1="580" x2="1040" y2="790" stroke="#f97316" stroke-width="8" opacity="0" filter="url(#glowOrange)"/>

      <!-- Legend -->
      <circle id="legendGreen" cx="1170" cy="500" r="8" fill="url(#greenDotGrad)"/>
      <text id="legendGreenText" x="1190" y="506" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#10b981">Pass</text>
      <circle id="legendRed" cx="1170" cy="540" r="8" fill="url(#redDotGrad)"/>
      <text id="legendRedText" x="1190" y="546" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#ef4444">Fail</text>
    </g>

    <!-- Label badge -->
    <g id="labelBadge">
      <rect id="badgeBg" x="1220" y="680" width="460" height="60" rx="30" fill="#151d30" stroke="#f97316" stroke-width="2"/>
      <text id="badgeText" x="1450" y="718" font-family="'Outfit', sans-serif" font-size="24" font-weight="600" fill="#f97316" text-anchor="middle">One neuron = one straight line</text>
    </g>
  </g>

  <!-- Cover rect for phase transition -->
  <rect id="cover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

  <!-- =============================== PHASE 2: The Limitation (20.5-35.5s) =============================== -->
  <g id="phase2">

    <!-- Scene title -->
    <text id="p2Title" x="960" y="70" font-family="'Outfit', sans-serif" font-weight="600" font-size="32" fill="#8892a8" text-anchor="middle">The Limitation</text>

    <!-- XOR-like scatter plot -->
    <g id="xorPlot">
      <!-- Backdrop panel -->
      <rect id="xorPanel" x="300" y="100" width="800" height="680" rx="16" fill="#151d30" opacity="0.5"/>

      <!-- Axes -->
      <line x1="380" y1="720" x2="1020" y2="720" stroke="#4a5568" stroke-width="2.5"/>
      <line x1="380" y1="720" x2="380" y2="160" stroke="#4a5568" stroke-width="2.5"/>

      <!-- Axis labels -->
      <text x="700" y="760" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#8892a8" text-anchor="middle">Feature 1</text>
      <text x="340" y="440" font-family="'Outfit', sans-serif" font-size="20" font-weight="400" fill="#8892a8" text-anchor="middle" transform="rotate(-90, 340, 440)">Feature 2</text>

      <!-- XOR pattern: green dots in top-left and bottom-right quadrants -->
      <!-- Top-left green cluster -->
      <circle id="xg1" cx="470" cy="250" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg2" cx="520" cy="280" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg3" cx="490" cy="310" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg4" cx="540" cy="230" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg5" cx="450" cy="290" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>

      <!-- Bottom-right green cluster -->
      <circle id="xg6" cx="850" cy="600" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg7" cx="900" cy="630" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg8" cx="870" cy="660" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg9" cx="920" cy="580" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>
      <circle id="xg10" cx="830" cy="640" r="12" fill="url(#greenDotGrad)" opacity="0.9"/>

      <!-- Top-right red cluster -->
      <circle id="xr1" cx="850" cy="250" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr2" cx="900" cy="280" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr3" cx="870" cy="310" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr4" cx="920" cy="230" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr5" cx="830" cy="290" r="12" fill="url(#redDotGrad)" opacity="0.9"/>

      <!-- Bottom-left red cluster -->
      <circle id="xr6" cx="470" cy="600" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr7" cx="520" cy="630" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr8" cx="490" cy="660" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr9" cx="540" cy="580" r="12" fill="url(#redDotGrad)" opacity="0.9"/>
      <circle id="xr10" cx="450" cy="640" r="12" fill="url(#redDotGrad)" opacity="0.9"/>

      <!-- Failed line attempts (3 rotations) -->
      <line id="failLine1" x1="380" y1="440" x2="1020" y2="440" stroke="#f97316" stroke-width="3" opacity="0"/>
      <line id="failLine2" x1="700" y1="160" x2="700" y2="720" stroke="#f97316" stroke-width="3" opacity="0"/>
      <line id="failLine3" x1="400" y1="180" x2="1000" y2="700" stroke="#f97316" stroke-width="3" opacity="0"/>

      <!-- Red X flashes for misclassified points -->
      <!-- For line 1 (horizontal): misclassifies bottom-right greens and top-right reds on same side -->
      <g id="xFlash1" opacity="0">
        <text x="850" y="610" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
        <text x="470" y="260" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
      </g>
      <!-- For line 2 (vertical): misclassifies mixed clusters -->
      <g id="xFlash2" opacity="0">
        <text x="900" y="640" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
        <text x="520" y="290" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
      </g>
      <!-- For line 3 (diagonal): still fails -->
      <g id="xFlash3" opacity="0">
        <text x="870" y="320" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
        <text x="490" y="650" font-family="'Outfit', sans-serif" font-size="28" font-weight="600" fill="#ef4444" text-anchor="middle" filter="url(#glowRed)">X</text>
      </g>
    </g>

    <!-- Right-side panel: neuron with red X -->
    <g id="stuckNeuron">
      <!-- Backdrop panel -->
      <rect id="stuckPanel" x="1200" y="180" width="560" height="280" rx="16" fill="#151d30" opacity="0.5"/>

      <!-- Single neuron icon -->
      <ellipse id="stuckGlow" cx="1480" cy="300" rx="70" ry="70" fill="#f97316" opacity="0.05" filter="url(#softGlow)"/>
      <circle id="stuckBody" cx="1480" cy="300" r="50" fill="url(#neuronGrad)" stroke="#fb923c" stroke-width="2.5"/>
      <text x="1480" y="308" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#e8ecf4" text-anchor="middle" font-weight="500">f(x)</text>

      <!-- Red X overlay on neuron -->
      <g id="stuckX" opacity="0">
        <line x1="1445" y1="265" x2="1515" y2="335" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
        <line x1="1515" y1="265" x2="1445" y2="335" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
      </g>

      <!-- "Stuck" label -->
      <text id="stuckLabel" x="1480" y="410" font-family="'Outfit', sans-serif" font-size="24" font-weight="600" fill="#ef4444" text-anchor="middle">One neuron is stuck</text>

    <!-- "What if we use more?" question -->
    <g id="questionGroup">
      <!-- Question card -->
      <rect id="questionBg" x="1180" y="520" width="600" height="120" rx="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5"/>

      <!-- Pulsing question mark -->
      <text id="questionMark" x="1480" y="730" font-family="'Instrument Serif', serif" font-size="80" fill="#8b5cf6" text-anchor="middle" filter="url(#glowPurple)">?</text>
      <!-- Question mark glow ring -->
      <circle id="questionPulseRing" cx="1480" cy="700" r="60" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    </g>
  </g>
</svg>

<div class="narration-sub" id="sub"></div>

<script>
gsap.registerPlugin(MotionPathPlugin);

/* ---- Subtitle engine ---- */
var T0 = performance.now();
var subs = [{"start": 0, "end": 3630, "text": "In Part 1, we built an artificial neuron from scratch."}, {"start": 3630, "end": 5448, "text": "Inputs, weights, bias, activation function."}, {"start": 5448, "end": 9441, "text": "It takes in numbers, does a calculation, and outputs a decision."}, {"start": 9441, "end": 14884, "text": "And we saw that what it really computes is a straight line through the data."}, {"start": 14884, "end": 20329, "text": "Everything on one side gets one label, everything on the other side gets the other."}, {"start": 20573, "end": 21264, "text": "And we hit a wall."}, {"start": 21264, "end": 24645, "text": "Some patterns can\u2019t be split by a single straight line."}, {"start": 24645, "end": 29031, "text": "If the data curves, or spirals, or forms clusters, one neuron is stuck."}, {"start": 29031, "end": 33761, "text": "So the natural question: what if we use more than one?"}];
(function tick() {
  var t = performance.now() - (window.T0_override || T0);
  var el = document.getElementById("sub");
  var active = null;
  for (var i = 0; i < subs.length; i++) { if (t >= subs[i].start && t < subs[i].end) { active = subs[i].text; break; } }
  el.textContent = active || '';
  el.style.opacity = active ? '1' : '0';
  requestAnimationFrame(tick);
})();

/* ---- GSAP Initial States ---- */

// Phase 1 elements
gsap.set("#sceneTitle", { opacity: 0, y: 12 });
gsap.set("#neuronPanel", { opacity: 0 });
gsap.set(["#nIn1", "#nIn2"], { opacity: 0, scale: 0.85 });
gsap.set("#nIn1", { svgOrigin: "340 190" });
