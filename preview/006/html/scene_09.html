<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 09 - Depth in Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root {
  --bg: #0b0f1a; --surface: #151d30; --text: #e8ecf4;
  --muted: #8892a8; --dim: #4a5568; --accent: #f97316;
  --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444;
  --green: #10b981; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif;
  width: 1920px; height: 1080px; overflow: hidden; position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1000;
}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<svg id="mainSvg" width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0;">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="abstractGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#151d30" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#151d30" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- OBS background rect -->
  <rect width="1920" height="1080" fill="#0b0f1a"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Depth Timeline (0 - 18.9s)                         -->
  <!-- Landmark networks and their depth                            -->
  <!-- ============================================================ -->
  <g id="phase1">

    <!-- Scene title -->
    <text id="p1Title" x="960" y="58" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">Depth in Practice</text>

    <!-- Subtitle badge -->
    <g id="p1Badge">
      <rect x="805" y="70" width="310" height="34" rx="8" fill="#151d30" stroke="#4a5568" stroke-width="1.5"/>
      <text x="960" y="94" text-anchor="middle" font-family="IBM Plex Mono" font-weight="400" font-size="20" fill="#4a5568">LANDMARK NETWORK DEPTH</text>
    </g>

    <!-- Timeline axis -->
    <line id="timeAxis" x1="180" y1="760" x2="1740" y2="760" stroke="#4a5568" stroke-width="2.5"/>

    <!-- Year markers -->
    <g id="yearMarkers" font-family="IBM Plex Mono" font-weight="400" font-size="22" fill="#8892a8" text-anchor="middle">
      <line x1="340" y1="755" x2="340" y2="770" stroke="#4a5568" stroke-width="2"/>
      <text x="340" y="800">2012</text>
      <line x1="740" y1="755" x2="740" y2="770" stroke="#4a5568" stroke-width="2"/>
      <text x="740" y="800">2014</text>
      <line x1="1140" y1="755" x2="1140" y2="770" stroke="#4a5568" stroke-width="2"/>
      <text x="1140" y="800">2015</text>
      <line x1="1540" y1="755" x2="1540" y2="770" stroke="#4a5568" stroke-width="2"/>
      <text x="1540" y="800">2020</text>
    </g>

    <!-- ====== AlexNet (2012): 8 layers ====== -->
    <g id="alexnet">
      <!-- Backdrop panel -->
      <rect x="250" y="600" width="180" height="160" rx="10" fill="#151d30" opacity="0.6"/>
      <!-- Layer bars (8 bars, each 14px tall, 2px gap) -->
      <rect class="alexBar" x="290" y="728" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="712" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="696" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="680" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="664" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="648" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="632" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <rect class="alexBar" x="290" y="616" width="100" height="14" rx="3" fill="url(#blueGrad)"/>
      <!-- Name label -->
      <text x="340" y="585" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#3b82f6">AlexNet</text>
      <!-- Layer count -->
      <text id="alexCount" x="340" y="560" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="28" fill="#e8ecf4">8 layers</text>
    </g>

    <!-- ====== VGGNet (2014): 19 layers ====== -->
    <g id="vggnet">
      <rect x="650" y="396" width="180" height="364" rx="10" fill="#151d30" opacity="0.6"/>
      <!-- 19 bars stacked (each 14px tall, 2px gap, from y=742 going up) -->
      <rect class="vggBar" x="690" y="728" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="712" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="696" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="680" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="664" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="648" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="632" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="616" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="600" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="584" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="568" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="552" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="536" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="520" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="504" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="488" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="472" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="456" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <rect class="vggBar" x="690" y="440" width="100" height="14" rx="3" fill="url(#purpleGrad)"/>
      <!-- Name label -->
      <text x="740" y="417" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#8b5cf6">VGGNet</text>
      <!-- Layer count -->
      <text id="vggCount" x="740" y="392" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="28" fill="#e8ecf4">19 layers</text>
    </g>

    <!-- ====== ResNet (2015): 152 layers ====== -->
    <g id="resnet">
      <!-- For 152 layers we show a dense compressed column -->
      <rect x="1050" y="140" width="180" height="620" rx="10" fill="#151d30" opacity="0.6"/>
      <!-- Dense block representing 152 layers (show as gradient-filled tall block) -->
      <rect id="resnetBlock" x="1090" y="180" width="100" height="562" rx="4" fill="url(#greenGrad)" opacity="0.8"/>
      <!-- Grid lines across the block to suggest many layers -->
      <line x1="1090" y1="218" x2="1190" y2="218" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="256" x2="1190" y2="256" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="294" x2="1190" y2="294" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="332" x2="1190" y2="332" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="370" x2="1190" y2="370" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="408" x2="1190" y2="408" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="446" x2="1190" y2="446" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="484" x2="1190" y2="484" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="522" x2="1190" y2="522" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="560" x2="1190" y2="560" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="598" x2="1190" y2="598" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="636" x2="1190" y2="636" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="674" x2="1190" y2="674" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1090" y1="712" x2="1190" y2="712" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <!-- "..." dots to indicate many layers -->
      <text x="1140" y="470" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="24" fill="#0b0f1a" opacity="0.5">...</text>
      <!-- Name label -->
      <text x="1140" y="160" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#10b981">ResNet</text>
      <!-- Layer count -->
      <text id="resCount" x="1140" y="135" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="28" fill="#e8ecf4">152 layers</text>
    </g>

    <!-- ====== GPT-3 (2020): 96 transformer layers ====== -->
    <g id="gpt3">
      <rect x="1450" y="280" width="180" height="480" rx="10" fill="#151d30" opacity="0.6"/>
      <!-- Dense block representing 96 transformer layers -->
      <rect id="gpt3Block" x="1490" y="320" width="100" height="422" rx="4" fill="url(#accentGrad)" opacity="0.8"/>
      <!-- Grid lines -->
      <line x1="1490" y1="358" x2="1590" y2="358" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="396" x2="1590" y2="396" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="434" x2="1590" y2="434" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="472" x2="1590" y2="472" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="510" x2="1590" y2="510" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="548" x2="1590" y2="548" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="586" x2="1590" y2="586" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="624" x2="1590" y2="624" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="662" x2="1590" y2="662" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <line x1="1490" y1="700" x2="1590" y2="700" stroke="#0b0f1a" stroke-width="1.5" opacity="0.3"/>
      <text x="1540" y="490" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="24" fill="#0b0f1a" opacity="0.5">...</text>
      <!-- Badge: transformer -->
      <rect x="1465" y="830" width="150" height="30" rx="8" fill="#151d30" stroke="#f97316" stroke-width="1.5"/>
      <text x="1540" y="851" text-anchor="middle" font-family="IBM Plex Mono" font-weight="400" font-size="16" fill="#f97316">transformer</text>
      <!-- Name label -->
      <text x="1540" y="300" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="26" fill="#f97316">GPT-3</text>
      <!-- Layer count -->
      <text id="gpt3Count" x="1540" y="275" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="28" fill="#e8ecf4">96 layers</text>
    </g>

    <!-- Trend arrow -->
    <g id="trendArrow">
      <path d="M380,570 C550,500 900,300 1500,240" fill="none" stroke="#f97316" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6"/>
      <polygon points="1500,234 1518,240 1500,246" fill="#f97316" opacity="0.6"/>
      <text x="960" y="340" text-anchor="middle" font-family="Outfit" font-weight="500" font-size="24" fill="#f97316" opacity="0.7">Going deeper</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Cover rect for phase transition                              -->
  <!-- ============================================================ -->
  <rect id="phaseCover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Feature Hierarchy (19.9 - 50.3s)                   -->
  <!-- What each layer of an image network learns                   -->
  <!-- ============================================================ -->
  <g id="phase2">

    <!-- Scene title -->
    <text id="p2Title" x="960" y="58" text-anchor="middle" font-family="Outfit" font-weight="600" font-size="32" fill="#8892a8">Why Depth Works</text>

    <!-- Central vertical arrow backbone -->
    <g id="backbone">
      <line x1="960" y1="780" x2="960" y2="100" stroke="#4a5568" stroke-width="2.5" stroke-dasharray="6,4"/>
      <polygon points="954,105 960,85 966,105" fill="#4a5568"/>
      <!-- Abstraction labels along the arrow -->
      <text x="994" y="770" font-family="IBM Plex Mono" font-weight="400" font-size="20" fill="#4a5568">Concrete</text>
      <text x="994" y="108" font-family="IBM Plex Mono" font-weight="400" font-size="20" fill="#4a5568">Abstract</text>
    </g>

    <!-- ====== Layer 1: Edge Detectors (bottom) ====== -->
    <g id="layer1">
      <rect x="120" y="660" width="720" height="140" rx="14" fill="#151d30" opacity="0.7"/>
      <text x="150" y="698" font-family="Outfit" font-weight="600" font-size="24" fill="#3b82f6">Layer 1</text>
      <text x="300" y="698" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8">Edge Detectors</text>

      <!-- Edge detector visuals: oriented lines in small boxes -->
      <g id="edgeIcons">
        <!-- Box 1: horizontal edge -->
        <rect x="160" y="714" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <line x1="172" y1="749" x2="218" y2="749" stroke="#3b82f6" stroke-width="3"/>

        <!-- Box 2: vertical edge -->
        <rect x="248" y="714" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <line x1="283" y1="726" x2="283" y2="772" stroke="#3b82f6" stroke-width="3"/>

        <!-- Box 3: diagonal edge (/) -->
        <rect x="336" y="714" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <line x1="350" y1="772" x2="394" y2="726" stroke="#3b82f6" stroke-width="3"/>

        <!-- Box 4: diagonal edge (\) -->
        <rect x="424" y="714" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <line x1="436" y1="726" x2="482" y2="772" stroke="#3b82f6" stroke-width="3"/>

        <!-- Box 5: curve fragment -->
        <rect x="512" y="714" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#3b82f6" stroke-width="2"/>
        <path d="M524,760 Q547,720 570,760" fill="none" stroke="#3b82f6" stroke-width="3"/>
      </g>
    </g>

    <!-- Connector arrow L1 to L2 -->
    <g id="conn12">
      <line x1="480" y1="660" x2="480" y2="540" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
      <polygon points="474,545 480,530 486,545" fill="#3b82f6" opacity="0.5"/>
    </g>

    <!-- ====== Layer 2: Textures and Corners ====== -->
    <g id="layer2">
      <rect x="120" y="400" width="720" height="140" rx="14" fill="#151d30" opacity="0.7"/>
      <text x="150" y="438" font-family="Outfit" font-weight="600" font-size="24" fill="#8b5cf6">Layer 2</text>
      <text x="300" y="438" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8">Textures &amp; Corners</text>

      <g id="textureIcons">
        <!-- Box 1: grid/crosshatch pattern -->
        <rect x="160" y="454" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="175" y1="469" x2="215" y2="469" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="175" y1="481" x2="215" y2="481" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="175" y1="493" x2="215" y2="493" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="175" y1="505" x2="215" y2="505" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="183" y1="462" x2="183" y2="512" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
        <line x1="195" y1="462" x2="195" y2="512" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
        <line x1="207" y1="462" x2="207" y2="512" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>

        <!-- Box 2: corner (L shape) -->
        <rect x="248" y="454" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M264,470 L264,506 L302,506" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>

        <!-- Box 3: T-junction -->
        <rect x="336" y="454" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="350" y1="489" x2="394" y2="489" stroke="#8b5cf6" stroke-width="3"/>
        <line x1="371" y1="468" x2="371" y2="510" stroke="#8b5cf6" stroke-width="3"/>

        <!-- Box 4: curve/arc -->
        <rect x="424" y="454" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M438,505 Q459,460 480,505" fill="none" stroke="#8b5cf6" stroke-width="3"/>

        <!-- Box 5: parallel stripes (texture) -->
        <rect x="512" y="454" width="70" height="70" rx="8" fill="#0b0f1a" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="530" y1="466" x2="546" y2="510" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="540" y1="466" x2="556" y2="510" stroke="#8b5cf6" stroke-width="2.5"/>
        <line x1="550" y1="466" x2="566" y2="510" stroke="#8b5cf6" stroke-width="2.5"/>
      </g>
    </g>

    <!-- Connector arrow L2 to L3 -->
    <g id="conn23">
      <line x1="480" y1="400" x2="480" y2="280" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
      <polygon points="474,285 480,270 486,285" fill="#8b5cf6" opacity="0.5"/>
    </g>

    <!-- ====== Layer 3: Shapes ====== -->
    <g id="layer3">
      <rect x="120" y="140" width="720" height="140" rx="14" fill="#151d30" opacity="0.7"/>
      <text x="150" y="178" font-family="Outfit" font-weight="600" font-size="24" fill="#06b6d4">Layer 3</text>
      <text x="300" y="178" font-family="Outfit" font-weight="400" font-size="22" fill="#8892a8">Shapes</text>
