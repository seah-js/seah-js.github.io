<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Scene 01 — Series Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root{--bg:#0b0f1a;--surface:#151d30;--text:#e8ecf4;--muted:#8892a8;--dim:#4a5568;--accent:#f97316;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--green:#10b981;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;width:1920px;height:1080px;overflow:hidden;position:relative;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0">
<defs>
  <radialGradient id="neuronGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
    <stop offset="60%" stop-color="#f97316" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowBlue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
  </radialGradient>
  <filter id="glowAccent" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e8ecf4"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#e8ecf4"/>
  </linearGradient>
  <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="50%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
  <!-- Glow filter for data flow dots -->
  <filter id="flowDotGlow" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

<!-- OBS background -->
<rect width="1920" height="1080" fill="#0b0f1a"/>

<!-- ===== PHASE 1: Title + Single Neuron + Network Morph ===== -->
<g id="phase1">

  <!-- Title group -->
  <g id="titleGroup">
    <text id="mainTitle" x="960" y="160" text-anchor="middle" font-family="'Instrument Serif',serif" font-size="64" fill="#e8ecf4" letter-spacing="5" filter="url(#glowSoft)">HOW AI ACTUALLY WORKS</text>
  </g>

  <!-- Part subtitle -->
  <g id="subtitleGroup">
    <line x1="760" y1="186" x2="1160" y2="186" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
    <text x="960" y="218" text-anchor="middle" font-family="'Outfit',sans-serif" font-weight="400" font-size="22" fill="#8892a8" letter-spacing="4">PART 2 : NEURAL NETWORKS</text>
  </g>

  <!-- ── Single neuron with straight decision line ── -->
  <g id="singleNeuronGroup" transform="translate(960, 520)">
    <!-- Backdrop panel -->
    <rect x="-320" y="-200" width="640" height="420" rx="16" fill="#151d30" opacity="0.4"/>

    <!-- Grid lines for scatter plot structure -->
    <g id="scatterGrid" opacity="0">
      <!-- Vertical grid lines -->
      <line x1="-240" y1="-180" x2="-240" y2="200" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="-120" y1="-180" x2="-120" y2="200" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="0" y1="-180" x2="0" y2="200" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="120" y1="-180" x2="120" y2="200" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="240" y1="-180" x2="240" y2="200" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <!-- Horizontal grid lines -->
      <line x1="-260" y1="-120" x2="260" y2="-120" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="-260" y1="-40" x2="260" y2="-40" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="-260" y1="40" x2="260" y2="40" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <line x1="-260" y1="120" x2="260" y2="120" stroke="#4a5568" stroke-width="1" opacity="0.15"/>
      <!-- Axis lines (stronger) -->
      <line x1="-260" y1="0" x2="260" y2="0" stroke="#4a5568" stroke-width="1.5" opacity="0.25"/>
      <line x1="0" y1="-180" x2="0" y2="200" stroke="#4a5568" stroke-width="1.5" opacity="0.25"/>
      <!-- Axis tick marks -->
      <line x1="-240" y1="-3" x2="-240" y2="3" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="-120" y1="-3" x2="-120" y2="3" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="120" y1="-3" x2="120" y2="3" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="240" y1="-3" x2="240" y2="3" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="-3" y1="-120" x2="3" y2="-120" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="-3" y1="-40" x2="3" y2="-40" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="-3" y1="40" x2="3" y2="40" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
      <line x1="-3" y1="120" x2="3" y2="120" stroke="#8892a8" stroke-width="1.5" opacity="0.3"/>
    </g>

    <!-- Decision scatter plot area -->
    <!-- Line equation in local coords: y = -0.417*x - 20 -->
    <!-- At x=-240: y = 100-20=80. At x=240: y=-100-20=-120 -->
    <!-- Green dots BELOW line (higher y values), Blue dots ABOVE (lower y values) -->
    <g id="scatterArea">
      <!-- Straight decision line -->
      <line id="straightLine" x1="-240" y1="80" x2="240" y2="-120" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0"/>

      <!-- Data points - BELOW the line (green) → must have y > (-0.417*x - 20) -->
      <circle class="dotGreen" cx="-200" cy="130" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="-140" cy="110" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="-80" cy="70" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="-20" cy="50" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="40" cy="30" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="100" cy="10" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="-160" cy="150" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="-40" cy="90" r="8" fill="#10b981" opacity="0"/>
      <circle class="dotGreen" cx="60" cy="50" r="8" fill="#10b981" opacity="0"/>

      <!-- Data points - ABOVE the line (blue) → must have y < (-0.417*x - 20) -->
      <circle class="dotBlue" cx="-200" cy="-20" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="-140" cy="-30" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="-80" cy="-50" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="0" cy="-60" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="80" cy="-90" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="160" cy="-120" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="200" cy="-140" r="8" fill="#3b82f6" opacity="0"/>
      <circle class="dotBlue" cx="-60" cy="-30" r="8" fill="#3b82f6" opacity="0"/>
    </g>

    <!-- Single neuron node -->
    <g id="singleNeuron">
      <circle id="snGlow" cx="0" cy="-170" r="50" fill="url(#neuronGlow)" opacity="0"/>
      <circle id="snBody" cx="0" cy="-170" r="24" fill="#151d30" stroke="#f97316" stroke-width="3" filter="url(#glowAccent)"/>
      <circle id="snCore" cx="0" cy="-170" r="9" fill="#f97316" opacity="0.6"/>
    </g>

    <!-- Label -->
    <text id="oneNeuronLabel" x="0" y="-125" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="400" fill="#8892a8">One neuron = one straight line</text>
  </g>

  <!-- ── Network expansion group (appears during sentence 3+4) ── -->
  <g id="networkGroup" transform="translate(960, 480)">

    <!-- Network connections (line elements for visual) -->
    <!-- Layer 1 to Layer 2 -->
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>

    <!-- Layer 2 to Layer 3 -->
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>

    <!-- Layer 3 to Output -->
    <line class="netConn l3o" x1="120" y1="-100" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="0" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="100" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="-100" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="0" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="100" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>

    <!-- Hidden path elements for MotionPathPlugin — ALL connections -->
    <!-- Layer 1→2: 9 paths (3 inputs × 3 hidden) -->
    <path id="fp12_0" d="M-400,-80 L-120,-140" fill="none" stroke="none"/>
    <path id="fp12_1" d="M-400,-80 L-120,-40" fill="none" stroke="none"/>
    <path id="fp12_2" d="M-400,-80 L-120,60" fill="none" stroke="none"/>
    <path id="fp12_3" d="M-400,0 L-120,-140" fill="none" stroke="none"/>
    <path id="fp12_4" d="M-400,0 L-120,-40" fill="none" stroke="none"/>
    <path id="fp12_5" d="M-400,0 L-120,60" fill="none" stroke="none"/>
    <path id="fp12_6" d="M-400,80 L-120,-140" fill="none" stroke="none"/>
    <path id="fp12_7" d="M-400,80 L-120,-40" fill="none" stroke="none"/>
    <path id="fp12_8" d="M-400,80 L-120,60" fill="none" stroke="none"/>
    <!-- Layer 2→3: 9 paths -->
    <path id="fp23_0" d="M-120,-140 L120,-100" fill="none" stroke="none"/>
    <path id="fp23_1" d="M-120,-140 L120,0" fill="none" stroke="none"/>
    <path id="fp23_2" d="M-120,-140 L120,100" fill="none" stroke="none"/>
    <path id="fp23_3" d="M-120,-40 L120,-100" fill="none" stroke="none"/>
    <path id="fp23_4" d="M-120,-40 L120,0" fill="none" stroke="none"/>
    <path id="fp23_5" d="M-120,-40 L120,100" fill="none" stroke="none"/>
    <path id="fp23_6" d="M-120,60 L120,-100" fill="none" stroke="none"/>
    <path id="fp23_7" d="M-120,60 L120,0" fill="none" stroke="none"/>
    <path id="fp23_8" d="M-120,60 L120,100" fill="none" stroke="none"/>
    <!-- Layer 3→Output: 6 paths (3 hidden × 2 output) -->
    <path id="fp3o_0" d="M120,-100 L380,-20" fill="none" stroke="none"/>
    <path id="fp3o_1" d="M120,-100 L380,60" fill="none" stroke="none"/>
    <path id="fp3o_2" d="M120,0 L380,-20" fill="none" stroke="none"/>
    <path id="fp3o_3" d="M120,0 L380,60" fill="none" stroke="none"/>
    <path id="fp3o_4" d="M120,100 L380,-20" fill="none" stroke="none"/>
    <path id="fp3o_5" d="M120,100 L380,60" fill="none" stroke="none"/>

    <!-- Layer 1: Input nodes (3) -->
    <g id="layer1">
      <circle cx="-400" cy="-80" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="-80" r="8" fill="#3b82f6" opacity="0"/>
      <circle cx="-400" cy="0" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="0" r="8" fill="#3b82f6" opacity="0"/>
      <circle cx="-400" cy="80" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="80" r="8" fill="#3b82f6" opacity="0"/>
    </g>
    <text id="layerLabel1" x="-400" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Input</text>

    <!-- Layer 2: Hidden nodes (3) -->
    <g id="layer2">
      <circle cx="-120" cy="-140" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="-140" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="-120" cy="-40" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="-40" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="-120" cy="60" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="60" r="8" fill="#8b5cf6" opacity="0"/>
    </g>
    <text id="layerLabel2" x="-120" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Hidden</text>

    <!-- Layer 3: Hidden nodes (3) -->
    <g id="layer3">
      <circle cx="120" cy="-100" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="-100" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="120" cy="0" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="0" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="120" cy="100" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="100" r="8" fill="#8b5cf6" opacity="0"/>
    </g>
    <text id="layerLabel3" x="120" y="170" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Hidden</text>

    <!-- Output nodes (2) -->
    <g id="layerOut">
      <circle cx="380" cy="-20" r="22" fill="#151d30" stroke="#06b6d4" stroke-width="2.5" opacity="0"/>
      <circle cx="380" cy="-20" r="9" fill="#06b6d4" opacity="0"/>
      <circle cx="380" cy="60" r="22" fill="#151d30" stroke="#06b6d4" stroke-width="2.5" opacity="0"/>
      <circle cx="380" cy="60" r="9" fill="#06b6d4" opacity="0"/>
    </g>
    <text id="layerLabelOut" x="380" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Output</text>

    <!-- Data flow dots — 9 per L1→L2, 9 per L2→L3, 6 per L3→Out -->
    <circle class="flowDot fd12" id="fd12_0" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_1" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_2" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_3" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_4" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_5" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_6" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_7" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd12" id="fd12_8" r="4" fill="#3b82f6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_0" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_1" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_2" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_3" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_4" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_5" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_6" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_7" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd23" id="fd23_8" r="4" fill="#8b5cf6" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd3o" id="fd3o_0" r="4" fill="#06b6d4" opacity="0" filter="url(#flowDotGlow)"/>
    <circle class="flowDot fd3o" id="fd3o_1" r="4" fill="#06b6d4" opacity="0" filter="url(#flowDotGlow)"/>

<script>
gsap.registerPlugin(MotionPathPlugin);

// ── Subtitle engine ──
var T0 = performance.now();
var subs = [
  {"start": 0, "end": 2751, "text": "A single neuron draws a straight line."},
  {"start": 2751, "end": 4323, "text": "That\u2019s useful, but limited."},
  {"start": 4323, "end": 7465, "text": "What happens when you connect thousands of them?"},
  {"start": 7465, "end": 14930, "text": "The lines start combining into curves, surfaces, and boundaries complex enough to recognize a face or understand a sentence."},
  {"start": 16231, "end": 21780, "text": "This is How AI Actually Works, Part 2: Neural Networks."}
];

(function tick() {
  var t = performance.now() - (window.T0_override || T0);
  var el = document.getElementById("sub");
  var active = null;
  for (var i = 0; i < subs.length; i++) {
    if (t >= subs[i].start && t < subs[i].end) { active = subs[i].text; break; }
  }
  el.textContent = active || "";
  el.style.opacity = active ? "1" : "0";
  requestAnimationFrame(tick);
})();

// ── Initial states ──
// Phase 1: title + subtitle
gsap.set("#titleGroup", { opacity: 0 });
gsap.set("#mainTitle", { opacity: 0, y: 14 });
gsap.set("#subtitleGroup", { opacity: 0, y: 10 });

// Phase 1: single neuron group
gsap.set("#singleNeuronGroup", { opacity: 0 });
gsap.set("#scatterGrid", { opacity: 0 });
gsap.set(".dotGreen", { opacity: 0, scale: 0 });
gsap.set(".dotBlue", { opacity: 0, scale: 0 });
gsap.set("#straightLine", { opacity: 0 });
gsap.set("#singleNeuron", { opacity: 0, scale: 0.85 });
gsap.set("#snGlow", { opacity: 0 });
gsap.set("#oneNeuronLabel", { opacity: 0, y: 8 });

// Phase 1: network group
gsap.set("#networkGroup", { opacity: 0 });
gsap.set("#layer1 circle", { opacity: 0 });
gsap.set("#layer2 circle", { opacity: 0 });
gsap.set("#layer3 circle", { opacity: 0 });
gsap.set("#layerOut circle", { opacity: 0 });
gsap.set("#layerLabel1", { opacity: 0 });
gsap.set("#layerLabel2", { opacity: 0 });
gsap.set("#layerLabel3", { opacity: 0 });
gsap.set("#layerLabelOut", { opacity: 0 });
gsap.set(".netConn", { opacity: 0 });
gsap.set("#networkLabel", { opacity: 0, y: 10 });
gsap.set(".curveDotG", { opacity: 0, scale: 0 });
gsap.set(".curveDotR", { opacity: 0, scale: 0 });
gsap.set("#curveGrid", { opacity: 0 });
gsap.set(".flowDot", { opacity: 0 });

// Phase 2
gsap.set("#phase2", { opacity: 0 });
gsap.set("#roadmapTitle", { opacity: 0, y: 14 });
gsap.set("#roadmapSubhead", { opacity: 0, y: 10 });
gsap.set("#roadmapPanel", { opacity: 0 });
gsap.set("#roadmapLine", { opacity: 0 });
gsap.set("#dot1", { opacity: 0, y: 12 });
gsap.set("#dot2", { opacity: 0, y: 12 });
gsap.set("#dot3", { opacity: 0, y: 12 });
gsap.set("#dot4", { opacity: 0, y: 12 });
gsap.set("#dot5", { opacity: 0, y: 12 });
gsap.set("#dot6", { opacity: 0, y: 12 });
gsap.set("#dot7", { opacity: 0, y: 12 });
gsap.set("#dot8", { opacity: 0, y: 12 });
gsap.set("#dot9", { opacity: 0, y: 12 });
gsap.set("#dot10", { opacity: 0, y: 12 });
gsap.set("#hereArrow", { opacity: 0, y: 8 });
gsap.set("#roadmapPulse", { opacity: 0 });

// ── Measure and set curvePath dash using JS getTotalLength ──
var curveEl = document.getElementById('curvePath');
var curveLen = curveEl.getTotalLength();
gsap.set("#curvePath", { strokeDasharray: curveLen, strokeDashoffset: curveLen });

// ── Ambient animations (infinite, independent of timeline) ──
// Single neuron core breathing
gsap.to("#snCore", {
  attr: { r: 11 }, opacity: 0.9,
  duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: -1
});

// Dot 2 glow pulse in roadmap
gsap.to("#dot2 circle:nth-child(2)", {
  opacity: 0.4, duration: 1.5, ease: "sine.inOut",
  yoyo: true, repeat: -1, delay: 16
});

// Network node breathing (layer 2 hidden nodes)
gsap.to("#layer2 circle:nth-child(1)", {
  attr: { r: 21.5 }, duration: 2.2, ease: "sine.inOut",
  yoyo: true, repeat: -1, delay: 5
});
gsap.to("#layer2 circle:nth-child(3)", {
  attr: { r: 21.5 }, duration: 2.5, ease: "sine.inOut",
  yoyo: true, repeat: -1, delay: 5.5
});
gsap.to("#layer2 circle:nth-child(5)", {
  attr: { r: 21.5 }, duration: 2.0, ease: "sine.inOut",
  yoyo: true, repeat: -1, delay: 6
});

// Curved boundary gentle shimmer
gsap.to("#curvePath", {
  opacity: 0.7, duration: 2.0, ease: "sine.inOut",
  yoyo: true, repeat: -1, delay: 10
});

// ── Helper: animate a single data flow dot along a path ──
function flowBurst(dotSelector, pathId, startTime, duration) {
  var dots = document.querySelectorAll(dotSelector);
  var idx = 0;
  dots.forEach(function(dot) {
    tl.set(dot, { opacity: 0.9 }, startTime + idx * 0.12)
      .to(dot, {
        motionPath: { path: "#" + pathId.replace("IDX", String.fromCharCode(97 + idx)), align: "#" + pathId.replace("IDX", String.fromCharCode(97 + idx)), alignOrigin: [0.5, 0.5] },
        duration: duration,
        ease: "power1.in"
      }, startTime + idx * 0.12)
      .set(dot, { opacity: 0 }, startTime + idx * 0.12 + duration);
    idx++;
  });
}

// ── Master timeline ──
var tl = gsap.timeline();

// =====================================================
// SUB 1 [0-2.75s]: "A single neuron draws a straight line."
// =====================================================

// Title materializes
tl.to("#titleGroup", { opacity: 1, duration: 0.01 }, 0.2)
  .to("#mainTitle", { opacity: 1, y: 0, duration: 1.0, ease: "back.out(1.4)" }, 0.3)

// Part subtitle
  .to("#subtitleGroup", { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.0)

// Single neuron group fades in
  .to("#singleNeuronGroup", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.8)

// Grid lines appear (subtle grounding)
  .to("#scatterGrid", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.9)

// Neuron node appears
  .to("#singleNeuron", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 1.0)
  .to("#snGlow", { opacity: 0.7, duration: 0.4, ease: "power2.out" }, 1.2)

// Scatter dots appear in stagger
  .to(".dotGreen", { opacity: 0.8, scale: 1, duration: 0.35, ease: "back.out(1.3)", stagger: 0.05 }, 1.3)
  .to(".dotBlue", { opacity: 0.8, scale: 1, duration: 0.35, ease: "back.out(1.3)", stagger: 0.05 }, 1.4)

// Straight decision line draws in (using dashoffset technique)
  .to("#straightLine", { opacity: 0.9, duration: 0.01 }, 2.0)
  .fromTo("#straightLine",
    { attr: { x2: -240, y2: 80 } },
    { attr: { x2: 240, y2: -120 }, duration: 0.6, ease: "power1.inOut" }, 2.0)

// =====================================================
// SUB 2 [2.75-4.32s]: "That's useful, but limited."
// =====================================================

  .to("#oneNeuronLabel", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 2.8)

// Pulse the line red briefly to emphasize "limited"
  .to("#straightLine", { stroke: "#ef4444", duration: 0.3, ease: "power2.in" }, 3.5)
  .to("#straightLine", { stroke: "#f97316", duration: 0.5, ease: "power2.out" }, 3.8)

// =====================================================
// SUB 3 [4.32-7.47s]: "What happens when you connect thousands?"
// Neuron "splits" outward → network appears from its position
// =====================================================

// Single neuron pulses bright before splitting
  .to("#snGlow", { opacity: 1, attr: { r: 80 }, duration: 0.4, ease: "power2.out" }, 4.3)
  .to("#snBody", { attr: { r: 28 }, duration: 0.3, ease: "power2.out" }, 4.3)

// Scatter and label fade out
  .to("#scatterArea", { opacity: 0, duration: 0.4, ease: "power2.in" }, 4.4)
  .to("#oneNeuronLabel", { opacity: 0, duration: 0.3 }, 4.4)
  .to("#scatterGrid", { opacity: 0, duration: 0.3 }, 4.4)

// The neuron body shrinks and fades as the network group appears
  .to("#singleNeuron", { opacity: 0, scale: 2, duration: 0.5, ease: "power2.in" }, 4.6)
  .to("#singleNeuronGroup", { opacity: 0, duration: 0.01 }, 5.1)

// Network group appears from center, expanding outward
  .to("#networkGroup", { opacity: 1, duration: 0.01 }, 4.9)

// Title dims to let network be the focus
  .to("#mainTitle", { opacity: 0.5, duration: 0.4, ease: "power2.out" }, 5.0)

// Layer 1 nodes appear (emanating from center)
  .fromTo("#layer1 circle", { scale: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 5.0)
  .to("#layerLabel1", { opacity: 0.7, duration: 0.3, ease: "power2.out" }, 5.3)

// Connections layer 1→2 trace in
  .to(".l12", { opacity: 0.35, duration: 0.4, ease: "power2.out", stagger: 0.02 }, 5.4)

// Layer 2 nodes appear
  .fromTo("#layer2 circle", { scale: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 5.6)
  .to("#layerLabel2", { opacity: 0.7, duration: 0.3, ease: "power2.out" }, 5.9)

// Connections layer 2→3
  .to(".l23", { opacity: 0.35, duration: 0.4, ease: "power2.out", stagger: 0.02 }, 6.0)

// Layer 3 nodes appear
  .fromTo("#layer3 circle", { scale: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 6.2)
  .to("#layerLabel3", { opacity: 0.7, duration: 0.3, ease: "power2.out" }, 6.5)

// Connections layer 3→output
  .to(".l3o", { opacity: 0.35, duration: 0.4, ease: "power2.out", stagger: 0.02 }, 6.5)

// Output nodes appear
  .fromTo("#layerOut circle", { scale: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.4)", stagger: 0.06 }, 6.7)
  .to("#layerLabelOut", { opacity: 0.7, duration: 0.3, ease: "power2.out" }, 7.0)

// =====================================================
// SUB 4 [7.47-14.93s]: "The lines start combining into
//   curves, surfaces, and boundaries complex enough to
//   recognize a face or understand a sentence."
// =====================================================

// Network label appears
  .to("#networkLabel", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 7.5);

// ── DATA FLOW — all connections light up with traveling dots ──
function animateFlowWave(startTime) {
  var i;
  // Layer 1→2: 9 dots on 9 paths, staggered
  for (i = 0; i < 9; i++) {
    (function(idx) {
      var dotId = "#fd12_" + idx;
      var pathId = "#fp12_" + idx;
      var t = startTime + idx * 0.04;
      tl.set(dotId, { opacity: 0.85, x: 0, y: 0 }, t)
        .to(dotId, {
          motionPath: { path: pathId, align: pathId, alignOrigin: [0.5, 0.5] },
          duration: 0.45, ease: "power1.in"
        }, t)
        .set(dotId, { opacity: 0 }, t + 0.45);
    })(i);
  }
  tl.to(".l12", { opacity: 0.6, duration: 0.25, ease: "power2.out" }, startTime)
    .to(".l12", { opacity: 0.35, duration: 0.3 }, startTime + 0.45);

  // Layer 2→3: 9 dots, starts 0.35s later
  var t23 = startTime + 0.35;
  for (i = 0; i < 9; i++) {
    (function(idx) {
      var dotId = "#fd23_" + idx;
      var pathId = "#fp23_" + idx;
      var t = t23 + idx * 0.04;
      tl.set(dotId, { opacity: 0.85, x: 0, y: 0 }, t)
        .to(dotId, {
          motionPath: { path: pathId, align: pathId, alignOrigin: [0.5, 0.5] },
          duration: 0.45, ease: "power1.in"
        }, t)
        .set(dotId, { opacity: 0 }, t + 0.45);
    })(i);
  }
  tl.to(".l23", { opacity: 0.6, duration: 0.25, ease: "power2.out" }, t23)
    .to(".l23", { opacity: 0.35, duration: 0.3 }, t23 + 0.45);

  // Layer 3→Output: 6 dots, starts 0.7s later
  var t3o = startTime + 0.7;
  for (i = 0; i < 6; i++) {
    (function(idx) {
      var dotId = "#fd3o_" + idx;

      var t = t3o + idx * 0.05;

          motionPath: { path: pathId, align: pathId, alignOrigin: [0.5, 0.5] },
          duration: 0.45, ease: "power1.in"
        }, t)
        .set(dotId, { opacity: 0 }, t + 0.45);
    })(i);
  }
  tl.to(".l3o", { opacity: 0.6, duration: 0.25, ease: "power2.out" }, t3o)
    .to(".l3o", { opacity: 0.35, duration: 0.3 }, t3o + 0.45);
}

  .to(".curveDotR", { opacity: 0.8, scale: 1, duration: 0.3, ease: "back.out(1.3)", stagger: 0.08 }, 10.6);

  .to(".curveDotR", { y: 3, duration: 1.5, ease: "sine.inOut", stagger: 0.1 }, 13.2);

tl.to("#phase1", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 15.0)
  .to("#cover", { opacity: 1, duration: 0.4 }, 15.5)

tl.to("#roadmapPanel", { opacity: 0.5, duration: 0.6, ease: "power3.out" }, 16.2)
  .to("#roadmapTitle", { opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.3)" }, 16.4)

  .to("#roadmapLine", { opacity: 0.6, duration: 0.8, ease: "power2.out" }, 17.2)

// Dots appear in sequence
  .to("#dot1", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 17.4)
  .to("#dot2", { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.5)" }, 17.7)

  .to("#dot4", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 18.2)
  .to("#dot5", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 18.4)
  .to("#dot6", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 18.6)
  .to("#dot7", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 18.8)
  .to("#dot8", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 19.0)
  .to("#dot9", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 19.2)

// Traveling pulse sweeps from dot 1 to dot 2
  .to("#roadmapPulse", { opacity: 0.9, duration: 0.2, ease: "power2.out" }, 19.6)
  .to("#roadmapPulse", { cx: 369, duration: 0.8, ease: "power2.inOut" }, 19.6)

  .to("#hereArrow", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 20.0)
