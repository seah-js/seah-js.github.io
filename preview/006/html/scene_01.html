<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 01 — Series Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/MotionPathPlugin.min.js"></script>
<style>
:root{--bg:#0b0f1a;--surface:#151d30;--text:#e8ecf4;--muted:#8892a8;--dim:#4a5568;--accent:#f97316;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--green:#10b981;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;width:1920px;height:1080px;overflow:hidden;position:relative;}
.narration-sub{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 32px;max-width:1600px;font-size:18px;color:#8892a8;opacity:0;z-index:100;transition:opacity 0.3s;text-shadow:0 0 6px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6);}
</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0">
<defs>
  <radialGradient id="neuronGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
    <stop offset="60%" stop-color="#f97316" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowBlue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nodeGlowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
  </radialGradient>
  <filter id="glowAccent" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e8ecf4"/>
    <stop offset="50%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#e8ecf4"/>
  </linearGradient>
  <!-- Curved decision boundary gradient -->
  <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="50%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
</defs>

<!-- OBS background -->
<rect width="1920" height="1080" fill="#0b0f1a"/>

<!-- ===== PHASE 1: Title + Single Neuron + Network Morph ===== -->
<g id="phase1">

  <!-- Title group -->
  <g id="titleGroup">
    <text id="mainTitle" x="960" y="160" text-anchor="middle" font-family="'Instrument Serif',serif" font-size="64" fill="#e8ecf4" letter-spacing="5" filter="url(#glowSoft)">HOW AI ACTUALLY WORKS</text>
  </g>

  <!-- Part subtitle -->
  <g id="subtitleGroup">
    <line x1="760" y1="186" x2="1160" y2="186" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
    <text x="960" y="218" text-anchor="middle" font-family="'Outfit',sans-serif" font-weight="400" font-size="22" fill="#8892a8" letter-spacing="4">PART 2 : NEURAL NETWORKS</text>
  </g>

  <!-- ── Single neuron with straight decision line ── -->
  <g id="singleNeuronGroup" transform="translate(960, 520)">
    <!-- Backdrop panel -->
    <rect x="-320" y="-200" width="640" height="420" rx="16" fill="#151d30" opacity="0.4"/>

    <!-- Decision scatter plot area -->
    <g id="scatterArea">
      <!-- Straight decision line -->
      <line id="straightLine" x1="-240" y1="80" x2="240" y2="-120" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

      <!-- Data points - left side (green) -->
      <circle class="dotGreen" cx="-180" cy="60" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-140" cy="100" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-200" cy="120" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-100" cy="140" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-160" cy="150" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-60" cy="110" r="7" fill="#10b981" opacity="0.8"/>
      <circle class="dotGreen" cx="-120" cy="30" r="7" fill="#10b981" opacity="0.8"/>

      <!-- Data points - right side (blue) -->
      <circle class="dotBlue" cx="60" cy="-60" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="120" cy="-100" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="180" cy="-80" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="100" cy="-30" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="160" cy="-140" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="200" cy="-50" r="7" fill="#3b82f6" opacity="0.8"/>
      <circle class="dotBlue" cx="140" cy="-10" r="7" fill="#3b82f6" opacity="0.8"/>
    </g>

    <!-- Single neuron node -->
    <g id="singleNeuron">
      <circle id="snGlow" cx="0" cy="-170" r="50" fill="url(#neuronGlow)" opacity="0"/>
      <circle id="snBody" cx="0" cy="-170" r="24" fill="#151d30" stroke="#f97316" stroke-width="3" filter="url(#glowAccent)"/>
      <circle id="snCore" cx="0" cy="-170" r="9" fill="#f97316" opacity="0.6"/>
    </g>

    <!-- Label -->
    <text id="oneNeuronLabel" x="0" y="-125" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="400" fill="#8892a8">One neuron = one straight line</text>
  </g>

  <!-- ── Network expansion group (appears during sentence 3+4) ── -->
  <g id="networkGroup" transform="translate(960, 480)">

    <!-- Network connections (drawn between nodes) -->
    <!-- Layer 1 to Layer 2 connections -->
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="-80" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="0" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0"/>
    <line class="netConn l12" x1="-400" y1="80" x2="-120" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0"/>

    <!-- Layer 2 to Layer 3 connections -->
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-140" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="-40" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="-100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0"/>
    <line class="netConn l23" x1="-120" y1="60" x2="120" y2="100" stroke="#8b5cf6" stroke-width="2" opacity="0"/>

    <!-- Layer 3 to Output connections -->
    <line class="netConn l3o" x1="120" y1="-100" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="0" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="100" x2="380" y2="-20" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="-100" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="0" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>
    <line class="netConn l3o" x1="120" y1="100" x2="380" y2="60" stroke="#06b6d4" stroke-width="2" opacity="0"/>

    <!-- Layer 1: Input nodes (3) -->
    <g id="layer1">
      <circle cx="-400" cy="-80" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="-80" r="8" fill="#3b82f6" opacity="0"/>
      <circle cx="-400" cy="0" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="0" r="8" fill="#3b82f6" opacity="0"/>
      <circle cx="-400" cy="80" r="20" fill="#151d30" stroke="#3b82f6" stroke-width="2.5" opacity="0"/>
      <circle cx="-400" cy="80" r="8" fill="#3b82f6" opacity="0"/>
    </g>
    <text id="layerLabel1" x="-400" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Input</text>

    <!-- Layer 2: Hidden nodes (3) -->
    <g id="layer2">
      <circle cx="-120" cy="-140" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="-140" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="-120" cy="-40" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="-40" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="-120" cy="60" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="-120" cy="60" r="8" fill="#8b5cf6" opacity="0"/>
    </g>
    <text id="layerLabel2" x="-120" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Hidden</text>

    <!-- Layer 3: Hidden nodes (3) -->
    <g id="layer3">
      <circle cx="120" cy="-100" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="-100" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="120" cy="0" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="0" r="8" fill="#8b5cf6" opacity="0"/>
      <circle cx="120" cy="100" r="20" fill="#151d30" stroke="#8b5cf6" stroke-width="2.5" opacity="0"/>
      <circle cx="120" cy="100" r="8" fill="#8b5cf6" opacity="0"/>
    </g>
    <text id="layerLabel3" x="120" y="170" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Hidden</text>

    <!-- Output nodes (2) -->
    <g id="layerOut">
      <circle cx="380" cy="-20" r="22" fill="#151d30" stroke="#06b6d4" stroke-width="2.5" opacity="0"/>
      <circle cx="380" cy="-20" r="9" fill="#06b6d4" opacity="0"/>
      <circle cx="380" cy="60" r="22" fill="#151d30" stroke="#06b6d4" stroke-width="2.5" opacity="0"/>
      <circle cx="380" cy="60" r="9" fill="#06b6d4" opacity="0"/>
    </g>
    <text id="layerLabelOut" x="380" y="130" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8" opacity="0">Output</text>

    <!-- Curved decision boundary (replaces the straight line concept) -->
    <g id="curvedBoundary">
      <path id="curvePath" d="M-460,260 C-380,200 -280,340 -160,240 S40,180 160,280 S340,200 460,260" stroke="url(#curveGrad)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0" stroke-dasharray="1200" stroke-dashoffset="1200"/>
      <!-- Scatter dots around the curve -->
      <circle class="curveDotG" cx="-400" cy="300" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="-320" cy="320" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="-200" cy="290" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="-80" cy="310" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="60" cy="330" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="200" cy="310" r="6" fill="#10b981" opacity="0"/>
      <circle class="curveDotG" cx="340" cy="300" r="6" fill="#10b981" opacity="0"/>

      <circle class="curveDotR" cx="-360" cy="200" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="-240" cy="180" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="-100" cy="200" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="20" cy="210" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="140" cy="220" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="280" cy="200" r="6" fill="#3b82f6" opacity="0"/>
      <circle class="curveDotR" cx="420" cy="210" r="6" fill="#3b82f6" opacity="0"/>
    </g>

    <!-- Network title label -->
    <text id="networkLabel" x="0" y="-220" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="24" font-weight="500" fill="#e8ecf4" opacity="0">Many neurons = complex boundaries</text>
  </g>
</g>

<!-- ===== Cover rect for phase transition ===== -->
<rect id="cover" x="0" y="0" width="1920" height="1080" fill="#0b0f1a" opacity="0"/>

<!-- ===== PHASE 2: Series Roadmap ===== -->
<g id="phase2">
  <rect id="roadmapPanel" x="80" y="280" width="1760" height="360" rx="20" fill="#151d30" opacity="0.5"/>

  <text id="roadmapTitle" x="960" y="220" text-anchor="middle" font-family="'Instrument Serif',serif" font-size="48" fill="#e8ecf4" filter="url(#glowSoft)">How AI Actually Works</text>
  <text id="roadmapSubhead" x="960" y="260" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="22" font-weight="300" fill="#8892a8">A 10-Part Series</text>

  <line id="roadmapLine" x1="200" y1="430" x2="1720" y2="430" stroke="#4a5568" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Traveling pulse dot -->
  <circle id="roadmapPulse" cx="200" cy="430" r="6" fill="#f97316" opacity="0"/>

  <!-- Part 1 — completed (checkmark, dimmed) -->
  <g id="dot1" class="roadDot">
    <circle cx="200" cy="430" r="18" fill="#151d30" stroke="#4a5568" stroke-width="2.5"/>
    <circle cx="200" cy="430" r="8" fill="#4a5568" opacity="0.5"/>
    <!-- Checkmark -->
    <path d="M190,430 L197,438 L212,422" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="200" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#4a5568" dy="-24">1</text>
    <text x="200" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#4a5568">Neuron</text>
  </g>

  <!-- Part 2 — active (glowing orange) -->
  <g id="dot2" class="roadDot">
    <circle cx="369" cy="430" r="22" fill="#151d30" stroke="#f97316" stroke-width="3" filter="url(#dotGlow)"/>
    <circle cx="369" cy="430" r="10" fill="#f97316" opacity="0.7"/>
    <text x="369" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="16" font-weight="600" fill="#f97316" dy="-30">2</text>
    <text x="369" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="500" fill="#f97316">Networks</text>
  </g>

  <!-- Part 3 -->
  <g id="dot3" class="roadDot">
    <circle cx="538" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="538" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">3</text>
    <text x="538" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Learning</text>
  </g>

  <!-- Part 4 -->
  <g id="dot4" class="roadDot">
    <circle cx="707" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="707" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">4</text>
    <text x="707" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Backprop</text>
  </g>

  <!-- Part 5 -->
  <g id="dot5" class="roadDot">
    <circle cx="876" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="876" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">5</text>
    <text x="876" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">CNNs</text>
  </g>

  <!-- Part 6 -->
  <g id="dot6" class="roadDot">
    <circle cx="1044" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="1044" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">6</text>
    <text x="1044" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Sequences</text>
  </g>

  <!-- Part 7 -->
  <g id="dot7" class="roadDot">
    <circle cx="1213" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="1213" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">7</text>
    <text x="1213" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Transformers</text>
  </g>

  <!-- Part 8 -->
  <g id="dot8" class="roadDot">
    <circle cx="1382" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="1382" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">8</text>
    <text x="1382" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Scale</text>
  </g>

  <!-- Part 9 -->
  <g id="dot9" class="roadDot">
    <circle cx="1551" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="1551" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">9</text>
    <text x="1551" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Assistants</text>
  </g>

  <!-- Part 10 -->
  <g id="dot10" class="roadDot">
    <circle cx="1720" cy="430" r="16" fill="#151d30" stroke="#4a5568" stroke-width="2"/>
    <text x="1720" y="420" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#8892a8" dy="-24">10</text>
    <text x="1720" y="490" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="300" fill="#8892a8">Frontier</text>
  </g>

  <!-- "You are here" indicator for Part 2 -->
  <g id="hereArrow">
    <text x="369" y="560" text-anchor="middle" font-family="'Outfit',sans-serif" font-size="20" font-weight="600" fill="#f97316">You are here</text>
    <line x1="369" y1="540" x2="369" y2="515" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
    <polygon points="361,518 369,508 377,518" fill="#f97316"/>
  </g>
</g>
</svg>

<div class="narration-sub" id="sub"></div>

<script>
gsap.registerPlugin(MotionPathPlugin);

// ── Subtitle engine ──
