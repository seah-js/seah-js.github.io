<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: system-ui;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
}
.clover {
  font-size: 100px;
  animation: float 2s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.6));
}
.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.particle {
  position: absolute;
  font-size: 24px;
  animation: rise linear infinite;
  opacity: 0.6;
}
.text {
  color: #fff;
  font-size: 20px;
  text-align: center;
  opacity: 0;
  animation: fadeIn 1s ease forwards 0.5s;
  z-index: 1;
  line-height: 1.6;
}
.subtitle {
  color: #4CAF50;
  font-size: 14px;
  opacity: 0;
  animation: fadeIn 1s ease forwards 1.5s;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-20px) rotate(5deg); }
  50% { transform: translateY(-35px) rotate(0deg); }
  75% { transform: translateY(-20px) rotate(-5deg); }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes rise {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container" style="z-index:1;position:relative;">
  <div class="clover">🍀</div>
  <div class="text">This is what Canvas could look like ✨<br>Right inside Telegram</div>
  <div class="subtitle">— Klover demo</div>
</div>
<script>
const emojis = ['🍀', '✨', '🌿', '💚', '⭐'];
const container = document.getElementById('particles');
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (4 + Math.random() * 6) + 's';
  p.style.animationDelay = Math.random() * 5 + 's';
  p.style.fontSize = (16 + Math.random() * 20) + 'px';
  container.appendChild(p);
}
</script>
</body>
</html>
